                            {filteredStudents.map(student => (
                                <div key={student.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-3 md:space-x-4 relative group hover:shadow-md transition-shadow">
                                    <div className="w-12 h-12 md:w-14 md:h-14 bg-blue-100 rounded-xl overflow-hidden flex items-center justify-center shrink-0 border border-gray-200 shadow-sm">
                                        {student.imageUrl ? (
                                            <img src={student.imageUrl} alt={student.name} className="w-full h-full object-cover" />
                                        ) : (
                                            <span className="text-mac-blue font-bold text-lg md:text-xl">{student.name.split(' ')[1]?.charAt(0) || 'น'}</span>
                                        )}
                                    </div>
                                    <div className="flex-1 min-w-0 pr-12 md:pr-0">
                                        <div className="font-semibold text-gray-800 text-sm truncate">{student.name}</div>
                                        <div className="text-[10px] md:text-xs text-gray-500 mt-0.5">รหัส: {student.studentId} • ปี {student.year}</div>
                                    </div>
                                    
                                    <div className="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity flex flex-col md:flex-row space-y-1 md:space-y-0 md:space-x-1.5 bg-white/90 backdrop-blur-sm p-1 rounded-lg md:shadow-sm md:border border-gray-100">
                                        <button onClick={() => handleEdit(student)} className="p-1 md:p-1.5 text-gray-500 hover:text-mac-blue rounded-md hover:bg-blue-50 transition-colors">
                                            <Icons.Edit width="14" height="14" className="md:w-4 md:h-4" />
                                        </button>
                                        <button onClick={() => setDeleteId(student.id)} className="p-1 md:p-1.5 text-gray-500 hover:text-red-500 rounded-md hover:bg-red-50 transition-colors">
                                            <Icons.Trash width="14" height="14" className="md:w-4 md:h-4" />
                                        </button>
                                    </div>

                                    {deleteId === student.id && (
                                        <div className="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-xl flex flex-col items-center justify-center space-y-2 z-10 border border-red-100">
                                            <span className="text-xs font-medium text-gray-700">ยืนยันลบ?</span>
                                            <div className="flex space-x-2">
                                                <button onClick={() => handleDelete(student.id)} className="px-3 py-1 bg-red-500 hover:bg-red-600 text-white text-[10px] md:text-xs font-semibold rounded-lg shadow-sm transition-colors">ลบ</button>
                                                <button onClick={() => setDeleteId(null)} className="px-3 py-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-[10px] md:text-xs font-semibold rounded-lg shadow-sm transition-colors">ยกเลิก</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                            {students.length === 0 && (
                                <div className="col-span-full py-10 md:py-12 text-center text-gray-500 bg-white rounded-xl border border-dashed border-gray-200 text-sm md:text-base">
                                    ไม่พบข้อมูลนักศึกษาในฐานข้อมูล
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const EvaluationProcess = ({ forms, subjects, students, initialFormId, onEvaluationSubmit }) => {
            const [step, setStep] = useState(1);
            const [selectedForm, setSelectedForm] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [answers, setAnswers] = useState({});
            const [teacherName, setTeacherName] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            useEffect(() => {
                if (initialFormId && step === 1 && forms.length > 0) {
                    const form = forms.find(f => f.id === initialFormId);
                    if (form) {
                        setSelectedForm(form);
                        setStep(2);
                    }
                }
            }, [initialFormId, forms, step]);

            const handleSelectForm = (form) => {
                setSelectedForm(form);
                setStep(2);
            };

            const handleSelectStudent = (student) => {
                setSelectedStudent(student);
                setStep(3);
                setAnswers({});
            };

            const handleOptionSelect = (criterionId, score) => {
                setAnswers(prev => ({ ...prev, [criterionId]: score }));
            };

            const handleSubmit = async () => {
                setIsSubmitting(true);
                const totalScore = calculateTotal();
                
                const evaluationRecord = {
                    id: `ev_${Date.now()}`,
                    timestamp: new Date().toLocaleString('th-TH'),
                    createdAt: Date.now(),
                    teacherName: teacherName,
                    student: selectedStudent,
                    form: selectedForm,
                    subject: subjects.find(s => s.id === selectedForm.subjectId) || { name: 'ไม่ระบุ' },
                    answers: answers,
                    totalScore: totalScore
                };

                try {
                    await onEvaluationSubmit(evaluationRecord);
                    setStep(4);
                } catch (error) {
                    alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const resetProcess = () => {
                setStep(1);
                setSelectedForm(null);
                setSelectedStudent(null);
                setAnswers({});
            };

            const calculateTotal = () => {
                return Object.values(answers).reduce((sum, score) => sum + Number(score), 0);
            };

            const availableStudents = selectedForm ? students.filter(s => s.year === selectedForm.year) : [];
            const isFormComplete = selectedForm && Object.keys(answers).length === selectedForm.criteria.length && teacherName.trim() !== '';

            return (
                <div className="flex-1 flex flex-col h-full bg-mac-bg relative">
                    <div className="h-14 md:h-16 px-4 md:px-8 flex items-center border-b border-gray-200 bg-white/50 backdrop-blur-sm shrink-0">
                        {step > 1 && step < 4 && (
                            <button onClick={() => setStep(step - 1)} className="mr-2 md:mr-4 p-1.5 md:p-2 text-gray-500 hover:text-gray-800 transition rounded-full hover:bg-gray-100">
                                <Icons.ChevronLeft />
                            </button>
                        )}
                        <h1 className="text-lg md:text-2xl font-bold text-gray-800 tracking-tight truncate">
                            {step === 1 && 'เลือกแบบประเมิน'}
                            {step === 2 && 'เลือกนักศึกษา'}
                            {step === 3 && 'ประเมินนักศึกษา'}
                            {step === 4 && 'ประเมินเสร็จสิ้น'}
                        </h1>
                    </div>

                    <div className="flex-1 p-4 md:p-8 overflow-y-auto">
                        {step === 1 && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                                {forms.map(form => (
                                    <div key={form.id} onClick={() => handleSelectForm(form)} className="bg-white rounded-xl p-4 md:p-5 shadow-sm border border-gray-100 hover:shadow-md hover:border-mac-blue transition-all cursor-pointer group">
                                        <div className="flex justify-between items-start mb-3">
                                            <div className="p-1.5 md:p-2 bg-blue-50 text-mac-blue rounded-lg group-hover:bg-mac-blue group-hover:text-white transition-colors relative">
                                                <Icons.ClipboardCheck width="18" height="18" />
                                            </div>
                                            <span className="text-[10px] md:text-xs font-bold px-2 py-1 bg-gray-100 text-gray-600 rounded-full">ปี {form.year}</span>
                                        </div>
                                        <h3 className="font-semibold text-gray-800 text-sm md:text-base leading-tight mb-2">{form.title}</h3>
                                        <div className="text-[10px] md:text-xs text-gray-500">
                                            {subjects.find(s => s.id === form.subjectId)?.name || 'N/A'} {form.courseCode ? `(${form.courseCode})` : ''}
                                        </div>
                                    </div>
                                ))}
                                {forms.length === 0 && (
                                    <div className="col-span-full py-10 md:py-16 text-center text-gray-500 bg-white rounded-xl border border-dashed border-gray-200">
                                        ยังไม่มีแบบประเมินในระบบ กรุณาติดต่อ Admin ให้สร้างแบบประเมินก่อนครับ
                                    </div>
                                )}
                            </div>
                        )}

                        {step === 2 && (
                            <div className="max-w-3xl mx-auto">
                                <div className="mb-4 md:mb-6 p-3 md:p-4 bg-blue-50 rounded-xl border border-blue-100 text-xs md:text-sm text-blue-800 shadow-sm flex items-center">
                                    <Icons.FileText className="shrink-0" />
                                    <div className="ml-2 truncate font-semibold">แบบประเมิน: <span className="font-normal">{selectedForm.title}</span></div>
                                </div>
                                <h3 className="text-xs md:text-sm font-bold text-gray-500 mb-3 md:mb-4 px-1">นักศึกษาชั้นปีที่ {selectedForm.year}</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                                    {availableStudents.map(student => (
                                        <div key={student.id} onClick={() => handleSelectStudent(student)} className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md hover:border-mac-blue transition-all cursor-pointer flex items-center space-x-3 md:space-x-5">
                                            <div className="w-14 h-14 md:w-20 md:h-20 bg-blue-100 rounded-xl overflow-hidden flex items-center justify-center shrink-0 shadow-sm border border-gray-200">
                                                {student.imageUrl ? (
                                                    <img src={student.imageUrl} alt={student.name} className="w-full h-full object-cover" />
                                                ) : (
                                                    <span className="text-mac-blue font-bold text-xl md:text-3xl">{student.name.split(' ')[1]?.charAt(0) || 'น'}</span>
                                                )}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="font-semibold text-gray-800 text-sm md:text-lg truncate">{student.name}</div>
                                                <div className="text-[10px] md:text-sm text-gray-500 mt-0.5 md:mt-1">รหัส: {student.studentId}</div>
                                            </div>
                                        </div>
                                    ))}
                                    {availableStudents.length === 0 && (
                                        <div className="col-span-full py-10 md:py-12 text-center text-gray-500 bg-white rounded-xl border border-dashed border-gray-200 text-sm">
                                            ไม่พบรายชื่อนักศึกษาในชั้นปีนี้
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="max-w-3xl mx-auto pb-32 md:pb-24">
                                <div className="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 mb-4 md:mb-6 flex flex-col md:flex-row justify-between items-center md:sticky top-0 z-10 glass-darker gap-3 md:gap-0">
                                    <div className="flex items-center space-x-4 w-full md:w-auto">
                                        <div className="w-16 h-16 md:w-24 md:h-24 bg-blue-100 rounded-xl overflow-hidden shadow-sm border border-gray-200 shrink-0">
                                            {selectedStudent?.imageUrl ? (
                                                <img src={selectedStudent.imageUrl} alt={selectedStudent?.name} className="w-full h-full object-cover" />
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center text-mac-blue font-bold text-2xl md:text-4xl">
                                                    {selectedStudent?.name.split(' ')[1]?.charAt(0) || 'น'}
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <h2 className="text-base md:text-xl font-bold text-gray-800 truncate">{selectedStudent?.name}</h2>
                                            <p className="text-[10px] md:text-sm text-gray-600 mt-0.5">รหัส: {selectedStudent?.studentId}</p>
                                            <p className="text-[10px] md:text-xs font-semibold text-mac-blue mt-1 md:mt-2 bg-blue-50 inline-block px-1.5 md:px-2 py-0.5 md:py-1 rounded truncate max-w-full">{selectedForm?.title}</p>
                                        </div>
                                    </div>
                                    <div className="text-center md:text-right bg-blue-50 px-4 md:px-5 py-2 md:py-3 rounded-xl border border-blue-100 shadow-inner w-full md:w-auto flex flex-row md:flex-col justify-between items-center md:items-end">
                                        <div className="text-[10px] md:text-xs font-bold text-blue-600 uppercase mb-0 md:mb-1">คะแนนรวม</div>
                                        <div className="text-2xl md:text-3xl font-black text-mac-blue">{calculateTotal()} <span className="text-xs md:text-sm text-gray-500 font-medium">/ {selectedForm?.totalScore}</span></div>
                                    </div>
                                </div>

                                <div className="space-y-4 md:space-y-6">
                                    {selectedForm?.criteria.map((criterion, index) => (
                                        <div key={criterion.id} className="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100">
                                            <h3 className="font-semibold text-gray-800 mb-3 md:mb-4 text-sm md:text-base leading-relaxed">
                                                <span className="text-mac-blue mr-1">{index + 1}.</span> {criterion.topic}
                                            </h3>
                                            <div className="space-y-2 md:space-y-3">
                                                {criterion.options.map((option, oIndex) => {
                                                    const isSelected = answers[criterion.id] === option.score;
                                                    return (
                                                        <div 
                                                            key={oIndex} 
                                                            onClick={() => handleOptionSelect(criterion.id, option.score)}
                                                            className={`p-3 md:p-4 rounded-xl border-2 cursor-pointer transition-all flex items-start md:items-center ${
                                                                isSelected 
                                                                ? 'border-mac-blue bg-blue-50/30 shadow-sm' 
                                                                : 'border-gray-100 bg-gray-50/50 hover:border-gray-300 hover:bg-gray-50'
                                                            }`}
                                                        >
                                                            <div className={`w-4 h-4 md:w-5 md:h-5 rounded-full border-2 mr-3 md:mr-4 mt-0.5 md:mt-0 flex items-center justify-center shrink-0 ${isSelected ? 'border-mac-blue' : 'border-gray-300'}`}>
                                                                {isSelected && <div className="w-2 h-2 md:w-2.5 md:h-2.5 rounded-full bg-mac-blue"></div>}
                                                            </div>
                                                            <div className="flex-1 text-xs md:text-sm text-gray-700 leading-relaxed pr-2">{option.label}</div>
                                                            <div className={`font-bold shrink-0 px-2 md:px-3 py-1 rounded-md text-[10px] md:text-sm ${isSelected ? 'bg-mac-blue text-white' : 'bg-gray-200 text-gray-600'}`}>
                                                                {option.score}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="bg-blue-50 p-4 md:p-6 rounded-xl shadow-sm border border-blue-100 mt-4 md:mt-6 mb-6">
                                    <h3 className="font-semibold text-blue-800 mb-3 md:mb-4 flex items-center text-sm md:text-base">
                                        <Icons.PenTool width="16" height="16" className="md:w-[18px] md:h-[18px]" /> <span className="ml-2">หลักฐานการประเมิน</span>
                                    </h3>
                                    <div>
                                        <label className="block text-xs md:text-sm font-medium text-blue-700 mb-1.5 md:mb-2">ลงชื่ออาจารย์ผู้ประเมิน <span className="text-red-500">*</span></label>
                                        <input 
                                            type="text" 
                                            value={teacherName}
                                            onChange={(e) => setTeacherName(e.target.value)}
                                            placeholder="พิมพ์ชื่อ-นามสกุล..."
                                            className="w-full px-3 md:px-4 py-2.5 md:py-3 border border-blue-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-mac-blue/50 bg-white shadow-inner text-sm md:text-base"
                                            required
                                        />
                                    </div>
                                </div>

                                <div className="fixed bottom-4 md:bottom-6 left-0 right-0 mx-auto w-full max-w-2xl px-4 z-20">
                                    <div className="glass-darker p-3 md:p-4 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-white/50 flex flex-col sm:flex-row justify-between items-center bg-white/95 gap-3 sm:gap-0">
                                        <div className="text-xs md:text-sm font-semibold text-gray-600">
                                            <span>ประเมินแล้ว <span className={`text-base md:text-lg ${Object.keys(answers).length === selectedForm?.criteria.length ? 'text-green-600' : 'text-mac-blue'}`}>{Object.keys(answers).length}</span> / {selectedForm?.criteria.length} ข้อ</span>
                                            {teacherName.trim() === '' && <span className="ml-2 text-red-500 text-[10px] md:text-xs">(รอลงชื่อ)</span>}
                                        </div>
                                        <button 
                                            onClick={handleSubmit}
                                            disabled={!isFormComplete || isSubmitting}
                                            className={`w-full sm:w-auto px-6 md:px-8 py-2 md:py-3 rounded-xl text-sm md:text-base font-bold transition-all flex items-center justify-center min-w-[200px] ${
                                                isFormComplete && !isSubmitting
                                                ? 'bg-mac-blue text-white hover:bg-blue-600 shadow-lg transform hover:-translate-y-0.5' 
                                                : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                                            }`}
                                        >
                                            {isSubmitting ? (
                                                <span className="flex items-center text-gray-500">
                                                    กำลังบันทึก...
                                                </span>
                                            ) : 'บันทึกผลการประเมิน'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 4 && (
                            <div className="h-full flex flex-col items-center justify-center text-center pb-20 px-4">
                                <div className="mb-4 md:mb-6"><Icons.CheckCircle className="text-green-500 w-12 h-12 md:w-16 md:h-16" /></div>
                                <h2 className="text-xl md:text-2xl font-bold text-gray-800 mb-2">บันทึกผลการประเมินสำเร็จ</h2>
                                <p className="text-sm md:text-base text-gray-500 mb-6 md:mb-8 max-w-md">
                                    บันทึกคะแนนเข้า <b>Firebase Database</b> เรียบร้อยแล้ว<br/><br/>
                                    <span className="font-bold text-mac-blue">{calculateTotal()}</span> คะแนน <br/>ของ <span className="font-medium text-gray-700">{selectedStudent?.name}</span>
                                </p>

                                <div className="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4 w-full sm:w-auto">
                                    <button onClick={() => {
                                        setStep(2);
                                        setAnswers({});
                                    }} className="px-6 py-2.5 bg-mac-blue text-white rounded-xl text-sm md:text-base font-medium shadow hover:bg-blue-600 transition-all hover:-translate-y-0.5 w-full sm:w-auto">
                                        ประเมินคนอื่นต่อ (วิชาเดิม)
                                    </button>
                                    <button onClick={resetProcess} className="px-6 py-2.5 bg-white text-gray-700 border border-gray-200 rounded-xl text-sm md:text-base font-medium shadow-sm hover:bg-gray-50 transition-all w-full sm:w-auto">
                                        กลับหน้าเลือกแบบประเมิน
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlFormId = urlParams.get('formId');

            const [activeMenu, setActiveMenu] = useState(urlFormId ? 'evaluation' : 'overview');
            const [view, setView] = useState('list'); 
            
            const [isDbReady, setIsDbReady] = useState(false);
            const [forms, setForms] = useState([]);
            const [students, setStudents] = useState([]);
            const [subjects, setSubjects] = useState([]);
            const [evaluations, setEvaluations] = useState([]);
            
            const [editingForm, setEditingForm] = useState(null);

            useEffect(() => {
                const initFirebaseListeners = () => {
                    const db = window.firebaseDB;
                    if (!db) return;

                    const unsubSubjects = window.fbOnSnapshot(window.fbCollection(db, 'subjects'), (snapshot) => {
                        setSubjects(snapshot.docs.map(d => d.data()));
                    });
                    const unsubStudents = window.fbOnSnapshot(window.fbCollection(db, 'students'), (snapshot) => {
                        setStudents(snapshot.docs.map(d => d.data()));
                    });
                    const unsubForms = window.fbOnSnapshot(window.fbCollection(db, 'forms'), (snapshot) => {
                        setForms(snapshot.docs.map(d => d.data()));
                    });
                    const unsubEvals = window.fbOnSnapshot(window.fbCollection(db, 'evaluations'), (snapshot) => {
                        const evals = snapshot.docs.map(d => d.data());
                        evals.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                        setEvaluations(evals);
                    });

                    setIsDbReady(true);

                    return () => {
                        unsubSubjects();
                        unsubStudents();
                        unsubForms();
                        unsubEvals();
                    };
                };

                if (window.firebaseDB) {
                    initFirebaseListeners();
                } else {
                    window.addEventListener('firebase-ready', initFirebaseListeners);
                    return () => window.removeEventListener('firebase-ready', initFirebaseListeners);
                }
            }, []);

            const saveToFirestore = async (collectionName, data) => {
                if (!window.firebaseDB) return;
                try {
                    await window.fbSetDoc(window.fbDoc(window.firebaseDB, collectionName, data.id), data);
                } catch (error) {
                    console.error("Error writing document: ", error);
                    alert("ไม่สามารถบันทึกข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่อและสิทธิ์ Firestore Rules ของคุณ");
                }
            };

            const deleteFromFirestore = async (collectionName, id) => {
                if (!window.firebaseDB) return;
                try {
                    await window.fbDeleteDoc(window.fbDoc(window.firebaseDB, collectionName, id));
                } catch (error) {
                    console.error("Error deleting document: ", error);
                    alert("เกิดข้อผิดพลาดในการลบข้อมูล");
                }
            };

            const handleEditForm = (form) => {
                setEditingForm(form);
                setView('edit');
            };

            const handleCreateForm = () => {
                setEditingForm(null);
                setView('edit');
            };

            const handleSaveForm = (savedForm) => {
                saveToFirestore('forms', savedForm);
                setView('list');
            };

            if (!isDbReady) {
                return (
                    <div className="w-full h-screen flex flex-col items-center justify-center bg-mac-bg">
                        <div className="w-12 h-12 border-4 border-mac-blue border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-gray-600 font-medium font-sans animate-pulse">กำลังเชื่อมต่อฐานข้อมูลศูนย์แพทย์...</p>
                    </div>
                );
            }

            return (
                <MacOSWindow title="MED EVAL - Medical Student Evaluation System">
                    <Sidebar activeMenu={activeMenu} setActiveMenu={setActiveMenu} />
                    
                    {activeMenu === 'overview' && (
                        <OverviewDashboard forms={forms} students={students} subjects={subjects} evaluations={evaluations} />
                    )}

                    {activeMenu === 'forms' && view === 'list' && (
                        <FormManager 
                            forms={forms} 
                            subjects={subjects} 
                            onEdit={handleEditForm} 
                            onCreate={handleCreateForm} 
                            onDelete={(id) => deleteFromFirestore('forms', id)}
                        />
                    )}
                    
                    {activeMenu === 'forms' && view === 'edit' && (
                        <FormEditor 
                            form={editingForm} 
                            subjects={subjects} 
                            onSave={handleSaveForm} 
                            onCancel={() => { setView('list'); setEditingForm(null); }} 
                        />
                    )}

                    {activeMenu === 'evaluation' && (
                        <EvaluationProcess 
                            forms={forms} 
                            subjects={subjects} 
                            students={students} 
                            initialFormId={urlFormId} 
                            onEvaluationSubmit={async (evalData) => await saveToFirestore('evaluations', evalData)} 
                        />
                    )}

                    {activeMenu === 'subjects' && (
                        <SubjectManager 
                            subjects={subjects} 
                            onSave={(data) => saveToFirestore('subjects', data)} 
                            onDelete={(id) => deleteFromFirestore('subjects', id)} 
                        />
                    )}

                    {activeMenu === 'students' && (
                        <StudentManager 
                            students={students} 
                            onSave={(data) => saveToFirestore('students', data)} 
                            onDelete={(id) => deleteFromFirestore('students', id)} 
                        />
                    )}

                    {activeMenu === 'settings' && (
                        <div className="flex-1 p-4 md:p-8 overflow-y-auto bg-mac-bg">
                            <div className="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                                <h2 className="text-xl font-bold text-gray-800 mb-6 flex items-center">
                                    <Icons.Settings className="mr-2 text-mac-blue" /> ตั้งค่าระบบ
                                </h2>
                                
                                <div className="space-y-6">
                                    <div className="p-4 md:p-6 bg-gradient-to-r from-purple-50 to-fuchsia-50 border border-purple-100 rounded-xl shadow-sm">
                                        <h3 className="font-bold text-purple-800 mb-2 flex items-center">
                                            <Icons.Sparkles className="mr-2 w-5 h-5 text-purple-600" /> สถานะระบบ AI
                                        </h3>
                                        <p className="text-sm text-purple-700 leading-relaxed font-medium">
                                            ✨ เชื่อมต่อกับระบบ Google Gemini AI อัตโนมัติเรียบร้อยแล้ว (ไม่ต้องใช้ API Key เพิ่มเติม)
                                        </p>
                                        <p className="text-xs text-purple-600 mt-2">
                                            คุณสามารถใช้ AI ช่วยแปลงตารางรูปภาพเป็นแบบฟอร์มได้ทันทีในหน้า "สร้างแบบประเมิน"
                                        </p>
                                    </div>
                                    
                                    <div className="p-4 md:p-6 bg-gray-50 border border-gray-100 rounded-xl">
                                         <h3 className="font-bold text-gray-800 mb-2 flex items-center">
                                            <Icons.Users className="mr-2 w-5 h-5 text-gray-600" /> การจัดการสิทธิ์ผู้ใช้งาน (รออัปเดต)
                                        </h3>
                                        <p className="text-sm text-gray-500">
                                            ระบบ Login และการแบ่งสิทธิ์ (Admin / อาจารย์) จะเปิดให้ใช้งานในเวอร์ชันถัดไป
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </MacOSWindow>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
