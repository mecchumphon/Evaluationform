        const firebaseConfig = {

            authDomain: "eval-meccph.firebaseapp.com",
            projectId: "eval-meccph",
            storageBucket: "eval-meccph.firebasestorage.app",

            appId: "1:826066180546:web:0f11ac2187c7bc35f41e5b",
            measurementId: "G-WNJ8RD0VM1"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const storage = getStorage(app);

            // Export to window so React (Babel) can use it
            window.firebaseDB = db;
            window.fbCollection = collection;
            window.fbOnSnapshot = onSnapshot;
            window.fbDoc = doc;
            window.fbSetDoc = setDoc;
            window.fbDeleteDoc = deleteDoc;
            
            // Export Storage functions
            window.firebaseStorage = storage;
            window.fbRef = ref;
            window.fbUploadBytes = uploadBytes;
            window.fbGetDownloadURL = getDownloadURL;

            // Notify React that Firebase is ready
            window.dispatchEvent(new Event('firebase-ready'));

            console.error("Firebase initialization failed:", error);
        }

        // --- Helper: Compress Image to save Firestore quota ---
        const resizeImage = (file, maxWidth = 300, maxHeight = 300) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            });
        };

        // --- Components ---

        const MacOSWindow = ({ children, title }) => {
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            const childrenWithProps = React.Children.map(children, child => {
                if (React.isValidElement(child)) {
                    return React.cloneElement(child, { isSidebarOpen, setIsSidebarOpen });
                }
                return child;
            });

            return (
                <div className="w-full h-full glass rounded-none md:rounded-2xl md:shadow-2xl flex flex-col overflow-hidden border-0 md:border border-white/40 relative">
                    <div className="h-12 w-full flex items-center justify-between px-4 relative select-none shrink-0 border-b border-gray-200/50 glass-darker">
                        <div className="flex items-center space-x-2">
                            <button 
                                onClick={() => setIsSidebarOpen(true)}
                                className="md:hidden p-1.5 text-gray-600 hover:text-black hover:bg-gray-200 rounded-md transition-colors"

                            </button>

                        </div>

                        </div>

                        {childrenWithProps}
                    </div>
                    {isSidebarOpen && (
                        <div 
                            className="fixed inset-0 bg-black/30 z-40 md:hidden backdrop-blur-sm"
                            onClick={() => setIsSidebarOpen(false)}
                        ></div>
                    )}
                </div>
            );
        };

        const Sidebar = ({ activeMenu, setActiveMenu, isSidebarOpen, setIsSidebarOpen }) => {
            const menuItems = [
                { id: 'overview', icon: <Icons.LayoutDashboard />, label: 'หน้าหลัก (Dashboard)' },
                { id: 'evaluation', icon: <Icons.ClipboardCheck />, label: 'ประเมินนักศึกษา (อาจารย์)' },
                { id: 'forms', icon: <Icons.Folder />, label: 'คลังแบบประเมิน (Admin)' },
                { id: 'subjects', icon: <Icons.BookOpen />, label: 'จัดการรายวิชา' },
                { id: 'students', icon: <Icons.Users />, label: 'นักศึกษาแพทย์' },
                { id: 'settings', icon: <Icons.Settings />, label: 'ตั้งค่าระบบ' },
            ];

            return (
                <div className={`
                    fixed md:relative z-50 w-64 h-full glass-darker border-r border-white/40 flex flex-col pt-4 select-none
                    transform transition-transform duration-300 ease-in-out bg-white/95 md:bg-transparent
                    ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0
                `}>
                    <div className="px-6 mb-6 flex justify-between items-start">

                            <h2 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">MEC CHUMPHON</h2>
                            <div className="text-sm font-semibold text-gray-800 leading-tight">
                                ศูนย์แพทย์ รพ.ชุมพรเขตรอุดมศักดิ์
                            </div>
                        </div>
                        <button 
                            onClick={() => setIsSidebarOpen(false)}
                            className="md:hidden p-1 text-gray-500 hover:text-black hover:bg-gray-200 rounded"
                        >
                            <Icons.X width="20" height="20" />
                        </button>
                    </div>
                    <div className="flex-1 px-3 space-y-1 overflow-y-auto pb-4">
                        {menuItems.map(item => (
                            <button 
                                key={item.id}
                                onClick={() => {
                                    setActiveMenu(item.id);
                                    if (window.innerWidth < 768) {
                                        setIsSidebarOpen(false);
                                    }
                                }}
                                className={`w-full flex items-center space-x-3 px-3 py-2 rounded-lg text-sm transition-colors duration-200 ${
                                    activeMenu === item.id 
                                    ? 'bg-mac-blue text-white shadow-sm font-medium' 
                                    : 'text-gray-700 hover:bg-white/50'
                                }`}
                            >
                                {item.icon}
                                <span>{item.label}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const FormEditor = ({ form, subjects, onSave, onCancel }) => {
            const [formData, setFormData] = useState(form || {
                id: `form_${Date.now()}`,
                type: 'manual', // 'manual' or 'ai'
                title: '',
                subjectId: '',
                year: 4,
                courseCode: '',
                totalScore: 100,
                weightPercent: 100,
                criteria: []
            });

            // AI State
            const [aiImage, setAiImage] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const handleChange = (e) => {
                const { name, value, type } = e.target;
                setFormData({
                    ...formData,
                    [name]: type === 'number' ? Number(value) : value
                });
            };

            const handleAiImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => setAiImage(event.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const processAI = async () => {
                if (!aiImage) return;

                setIsAnalyzing(true);
                try {
                    const base64Data = aiImage.split(',')[1];
                    const mimeType = aiImage.split(';')[0].split(':')[1];

                    const prompt = `คุณคือผู้ช่วยคณาจารย์แพทย์ หน้าที่ของคุณคืออ่านตารางแบบประเมินนี้ และแปลงให้เป็นข้อมูล JSON อย่างเคร่งครัด
                    
                    สิ่งที่ต้องหา:
                    1. 'หัวข้อการประเมิน' (topic) เช่น ซักประวัติ, ตรวจร่างกาย
                    2. 'เกณฑ์การให้คะแนน' (options) โดยมี 'คะแนน' (score - ต้องเป็นตัวเลข) และ 'คำอธิบาย' (label)
                    
                    ข้อกำหนด:
                    - ตอบกลับมาเป็น JSON Array เท่านั้น ห้ามพิมพ์ข้อความอธิบายใดๆ นอกกรอบ JSON
                    - รูปแบบผลลัพธ์ที่ต้องการ (อย่าลืม [] ครอบทั้งหมด):
                    [
                        {
                            "topic": "ชื่อหัวข้อ",
                            "options": [
                                { "score": 5, "label": "คำอธิบายเกณฑ์ที่ดีมาก" },
                                { "score": 0, "label": "คำอธิบายเกณฑ์ที่ต้องปรับปรุง" }
                            ]
                        }
                    ]`;

                    const apiKey = ""; // API Key provided via environment
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                role: "user",
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: mimeType, data: base64Data } }
                                ]
                            }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || 'API Error');
                    }

                    const result = await response.json();
                    const text = result.candidates[0].content.parts[0].text;
                    const cleanJsonStr = text.replace(/```json/g, '').replace(/```/g, '').trim();
                    let aiData = JSON.parse(cleanJsonStr);

                    aiData = aiData.map(c => ({
                        ...c,
                        id: `c_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`
                    }));

                    setFormData({ ...formData, criteria: aiData, type: 'manual' });
                    setAiImage(null);
                    alert("✨ AI วิเคราะห์ข้อมูลสำเร็จ!\nระบบได้นำข้อมูลมาใส่ในฟอร์มแล้ว กรุณาตรวจสอบและแก้ไขได้ตามต้องการครับ");

                } catch (error) {
                    console.error("AI Analysis Failed:", error);
                    alert(`เกิดข้อผิดพลาดในการวิเคราะห์ด้วย AI: ${error.message}\nโปรดตรวจสอบภาพถ่ายอีกครั้ง`);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                let finalData = { ...formData, updatedAt: new Date().toISOString().split('T')[0] };
                if (finalData.type === 'ai') finalData.type = 'manual'; // Fallback to manual after creation
                
                onSave(finalData);
            };

            const addCriterion = () => setFormData({ ...formData, criteria: [...formData.criteria, { id: `c_${Date.now()}`, topic: '', options: [{ score: 0, label: '' }] }] });
            const updateCriterion = (index, field, value) => { const newCriteria = [...formData.criteria]; newCriteria[index][field] = value; setFormData({ ...formData, criteria: newCriteria }); };
            const removeCriterion = (index) => { const newCriteria = [...formData.criteria]; newCriteria.splice(index, 1); setFormData({ ...formData, criteria: newCriteria }); };
            const addOption = (cIndex) => { const newCriteria = [...formData.criteria]; newCriteria[cIndex].options.push({ score: 0, label: '' }); setFormData({ ...formData, criteria: newCriteria }); };
            const updateOption = (cIndex, oIndex, field, value) => { const newCriteria = [...formData.criteria]; newCriteria[cIndex].options[oIndex][field] = value; setFormData({ ...formData, criteria: newCriteria }); };
            const removeOption = (cIndex, oIndex) => { const newCriteria = [...formData.criteria]; newCriteria[cIndex].options.splice(oIndex, 1); setFormData({ ...formData, criteria: newCriteria }); };

            const calculateAutoTotal = () => {
                let total = 0;
                formData.criteria.forEach(c => {
                    if (c.options.length > 0) {
                        const maxScore = Math.max(...c.options.map(o => Number(o.score) || 0));
                        total += maxScore;
                    }
                });
                return total;
            };

            return (
                <div className="flex-1 flex flex-col h-full bg-white/50 backdrop-blur-md">
                    <div className="h-auto md:h-14 py-3 md:py-0 border-b border-gray-200 flex flex-wrap gap-2 md:gap-0 items-center justify-between px-4 md:px-6 bg-white/70 shrink-0">
                        <button onClick={onCancel} className="flex items-center text-gray-500 hover:text-gray-800 transition" disabled={isAnalyzing}>
                            <Icons.ChevronLeft />
                            <span className="ml-1 text-sm font-medium">ย้อนกลับ</span>
                        </button>
                        <h2 className="text-base md:text-lg font-bold text-gray-800 truncate px-2 max-w-[200px] md:max-w-md text-center">
                            {form ? 'แก้ไขแบบประเมิน' : 'สร้างแบบประเมินใหม่'}
                        </h2>
                        <button onClick={handleSubmit} disabled={isAnalyzing} className="px-4 py-1.5 bg-mac-blue text-white rounded-md text-sm font-medium shadow-sm hover:bg-blue-600 transition disabled:opacity-50">
                            บันทึก
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 md:p-8">
                        <div className="max-w-4xl mx-auto space-y-6 md:space-y-8 pb-12">
                            
                            {/* Toggle Type */}
                            <div className="flex justify-center bg-gray-100 p-1.5 rounded-xl w-fit mx-auto flex-wrap gap-1 md:gap-2 shadow-inner">
                                <button type="button" onClick={() => setFormData({...formData, type: 'manual'})} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all flex items-center ${formData.type === 'manual' ? 'bg-white shadow-sm text-mac-blue' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200'}`}>
                                    <Icons.PenTool width="16" height="16" className="mr-1.5" /> พิมพ์เอง (Manual)
                                </button>
                                <button type="button" onClick={() => setFormData({...formData, type: 'ai'})} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all flex items-center ${formData.type === 'ai' ? 'bg-white shadow-sm text-purple-600 border border-purple-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200'}`}>
                                    <Icons.Sparkles width="16" height="16" className="mr-1.5" /> ให้ AI ช่วยพิมพ์ให้
                                </button>
                            </div>

                            <div className="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100">
                                <h3 className="text-md font-semibold text-gray-700 mb-4 pb-2 border-b">ข้อมูลทั่วไป</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="col-span-1 md:col-span-2">
                                        <label className="block text-sm font-medium text-gray-600 mb-1">ชื่อแบบประเมิน <span className="text-red-500">*</span></label>
                                        <input type="text" name="title" value={formData.title} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm" placeholder="เช่น แบบประเมินการตรวจร่างกาย..." required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-600 mb-1">รหัสวิชา</label>
                                        <input type="text" name="courseCode" value={formData.courseCode} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm" placeholder="เช่น พศ.401" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-600 mb-1">รายวิชา</label>
                                        <select name="subjectId" value={formData.subjectId} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm bg-white">
                                            <option value="">เลือกรายวิชา...</option>
                                            {subjects.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-600 mb-1">ชั้นปี</label>
                                        <select name="year" value={formData.year} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm bg-white">
                                            {[4, 5, 6].map(y => <option key={y} value={y}>ปี {y}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex space-x-4">
                                        <div className="flex-1">
                                            <label className="block text-sm font-medium text-gray-600 mb-1">คะแนนเต็ม <span className="text-xs text-gray-400">(Auto: {calculateAutoTotal()})</span></label>
                                            <input type="number" name="totalScore" value={calculateAutoTotal()} disabled className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm bg-gray-50 text-gray-500" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="block text-sm font-medium text-gray-600 mb-1">คิดเป็น %</label>
                                            <input type="number" name="weightPercent" value={formData.weightPercent} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Conditional Rendering based on Type */}
                            {formData.type === 'ai' ? (
                                <div className="bg-gradient-to-br from-purple-50 to-white p-6 md:p-8 rounded-xl shadow-sm border border-purple-100 flex flex-col items-center justify-center space-y-4">
                                    <div className="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center text-purple-600 shadow-inner">
                                        <Icons.Sparkles width="32" height="32" />
                                    </div>
                                    <div className="text-center max-w-lg">
                                        <h3 className="text-lg font-bold text-gray-800">ผู้ช่วย AI สร้างแบบประเมิน</h3>
                                        <p className="text-sm text-gray-600 mt-2 mb-6">
                                            1. แคปหน้าจอภาพตาราง (Rubric) แบบประเมินของคุณ <br/>
                                            2. อัปโหลดรูปภาพลงที่นี่ <br/>
                                            3. ระบบ AI จะอ่านเกณฑ์และคะแนน แล้วสร้างเป็นฟอร์มให้คุณอัตโนมัติ!
                                        </p>
                                    </div>

                                    {!aiImage ? (
                                        <label className="cursor-pointer bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-md transition-all flex items-center transform hover:-translate-y-0.5">
                                            <Icons.Upload className="mr-2" /> อัปโหลดภาพหน้าจอแบบประเมิน
                                            <input type="file" accept="image/png, image/jpeg" onChange={handleAiImageUpload} className="hidden" />
                                        </label>
                                    ) : (
                                        <div className="w-full max-w-lg space-y-4 flex flex-col items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                            <div className="w-full h-48 md:h-64 bg-gray-50 rounded-lg overflow-hidden border border-gray-200 flex items-center justify-center relative group">
                                                <img src={aiImage} alt="Preview Rubric" className="max-w-full max-h-full object-contain" />
                                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                    <label className="cursor-pointer bg-white text-gray-800 px-4 py-2 rounded-lg text-sm font-medium shadow">
                                                        เปลี่ยนรูปภาพ <input type="file" accept="image/png, image/jpeg" onChange={handleAiImageUpload} className="hidden" />
                                                    </label>
                                                </div>
                                            </div>
                                            <button onClick={processAI} disabled={isAnalyzing} className="w-full py-3 bg-purple-600 text-white rounded-xl text-sm font-bold shadow-md hover:bg-purple-700 transition-all disabled:opacity-50 flex justify-center items-center">
                                                {isAnalyzing ? (
                                                    <><div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></div> กำลังให้ AI อ่านข้อมูล...</>
                                                ) : (
                                                    <><Icons.Sparkles className="mr-2" /> เริ่มสร้างแบบฟอร์มด้วย AI</>
                                                )}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="flex items-center justify-between">
                                        <h3 className="text-lg font-bold text-gray-800">หัวข้อการประเมิน</h3>
                                        <button onClick={addCriterion} className="flex items-center px-3 py-1.5 bg-gray-100 text-gray-700 rounded-md text-sm hover:bg-gray-200 transition">
                                            <Icons.Plus /> <span className="ml-1">เพิ่มหัวข้อ</span>
                                        </button>
                                    </div>

                                    {formData.criteria.map((criterion, cIndex) => (
                                        <div key={criterion.id} className="bg-white p-4 md:p-5 rounded-xl shadow-sm border border-gray-100 relative group transition-all hover:shadow-md hover:border-mac-blue/30">
                                            <div className="absolute top-4 right-4 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                                <button onClick={() => removeCriterion(cIndex)} className="text-red-400 hover:text-red-600 p-1.5 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                                                    <Icons.Trash width="16" height="16" />
                                                </button>
                                            </div>
                                            <div className="mb-4 pr-10">
                                                <label className="block text-sm font-bold text-mac-blue mb-1">ข้อที่ {cIndex + 1}</label>
                                                <textarea 
                                                    value={criterion.topic} 
                                                    onChange={(e) => updateCriterion(cIndex, 'topic', e.target.value)}
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm resize-none"
                                                    rows="2"
                                                    placeholder="ระบุหัวข้อการประเมิน..."
                                                />
                                            </div>

                                            <div className="bg-gray-50 rounded-lg p-3 md:p-4 border border-gray-100">
                                                <div className="flex justify-between items-center mb-3">
                                                    <h4 className="text-[10px] md:text-xs font-semibold text-gray-500 uppercase tracking-wide flex items-center">
                                                        <Icons.CheckCircle width="14" height="14" className="mr-1" /> เกณฑ์การให้คะแนน
                                                    </h4>
                                                    <button onClick={() => addOption(cIndex)} className="text-xs text-mac-blue hover:text-blue-700 hover:bg-blue-50 px-2 py-1 rounded transition-colors flex items-center font-medium">
                                                        <Icons.Plus width="14" height="14" className="mr-1" /> เพิ่มตัวเลือก
                                                    </button>
                                                </div>
                                                
                                                <div className="space-y-2">
                                                    {criterion.options.map((option, oIndex) => (
                                                        <div key={oIndex} className="flex items-start space-x-2 bg-white p-2 rounded border border-gray-200">
                                                            <div className="w-16 md:w-20 shrink-0">
                                                                <input 
                                                                    type="number" 
                                                                    value={option.score} 
                                                                    onChange={(e) => updateOption(cIndex, oIndex, 'score', e.target.value)}
                                                                    className="w-full px-2 py-1.5 border border-gray-200 rounded text-center text-sm font-bold text-gray-800 focus:outline-none focus:border-mac-blue focus:ring-1 focus:ring-mac-blue bg-blue-50/30"
                                                                    placeholder="คะแนน"
                                                                />
                                                            </div>
                                                            <div className="flex-1">
                                                                <input 
                                                                    type="text" 
                                                                    value={option.label} 
                                                                    onChange={(e) => updateOption(cIndex, oIndex, 'label', e.target.value)}
                                                                    className="w-full px-3 py-1.5 border border-gray-200 rounded text-sm focus:outline-none focus:border-mac-blue focus:ring-1 focus:ring-mac-blue"
                                                                    placeholder="คำอธิบายเกณฑ์ เช่น ดีเยี่ยม..."
                                                                />
                                                            </div>
                                                            <button onClick={() => removeOption(cIndex, oIndex)} className="mt-1.5 p-1 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors">
                                                                <Icons.Trash width="14" height="14" />
                                                            </button>
                                                        </div>
                                                    ))}
                                                    {criterion.options.length === 0 && (
                                                        <div className="text-xs text-gray-400 italic text-center py-4 bg-white rounded border border-dashed">
                                                            คลิก "เพิ่มตัวเลือก" ด้านบน เพื่อสร้างเกณฑ์คะแนน
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}

                                    {formData.criteria.length === 0 && (
                                        <div className="text-center py-12 bg-white rounded-xl border-2 border-dashed border-gray-200 text-gray-400 text-sm">
                                            <Icons.PenTool className="w-10 h-10 mx-auto mb-3 text-gray-300" />
                                            คลิก "เพิ่มหัวข้อ" ด้านบน เพื่อเริ่มสร้างแบบประเมิน<br/>
                                            หรือใช้เมนู "ให้ AI ช่วยพิมพ์ให้" เพื่อความรวดเร็ว!
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const OverviewDashboard = ({ forms, students, subjects, evaluations }) => {
            const stats = [
                { label: 'นักศึกษาทั้งหมด', value: students.length, icon: <Icons.Users className="w-5 h-5 md:w-6 md:h-6 text-blue-500" strokeWidth="2.5" />, bg: 'bg-blue-50' },
                { label: 'แบบประเมินในคลัง', value: forms.length, icon: <Icons.FileText className="w-5 h-5 md:w-6 md:h-6 text-purple-500" strokeWidth="2.5" />, bg: 'bg-purple-50' },
                { label: 'ประเมินแล้ว', value: evaluations.length, icon: <Icons.CheckCircle className="w-5 h-5 md:w-6 md:h-6 text-green-500" strokeWidth="2.5" />, bg: 'bg-green-50' },
                { label: 'รายวิชาทั้งหมด', value: subjects.length, icon: <Icons.BookOpen className="w-5 h-5 md:w-6 md:h-6 text-orange-500" strokeWidth="2.5" />, bg: 'bg-orange-50' }
            ];

            const exportToCSV = (ev) => {
                let csvContent = "\uFEFF"; 
                csvContent += "รายงานผลการประเมินนักศึกษาแพทย์\n\n";
                csvContent += `วันเวลาที่ประเมิน,${ev.timestamp}\n`;
                csvContent += `อาจารย์ผู้ประเมิน,${ev.teacherName}\n`;
                csvContent += `นักศึกษา,${ev.student.name} (รหัส: ${ev.student.studentId})\n`;
                csvContent += `ชั้นปี,${ev.student.year}\n`;
                csvContent += `รายวิชา,${ev.subject.name} (${ev.form.courseCode})\n`;
                csvContent += `แบบประเมิน,${ev.form.title}\n`;
                csvContent += `คะแนนรวม,${ev.totalScore} / ${ev.form.totalScore}\n\n`;
                
                csvContent += "ข้อที่,หัวข้อการประเมิน,เกณฑ์ที่ได้,คะแนน\n";
                ev.form.criteria?.forEach((c, idx) => {
                    const score = ev.answers[c.id];
                    const option = c.options.find(o => o.score === score);
                    const label = option ? option.label.replace(/,/g, ' ') : '';
                    csvContent += `${idx + 1},"${c.topic}","${label}",${score}\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `ผลการประเมิน_${ev.student.studentId}_${new Date().getTime()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const exportToPDF = (ev) => {
                const printWindow = window.open('', '_blank');
                let html = `
                    <html>
                    <head>
                        <title>ผลการประเมิน - ${ev.student.name}</title>
                        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
                        <style>
                            body { font-family: 'Sarabun', sans-serif; padding: 40px; color: #333; max-width: 800px; margin: 0 auto; }
                            h1 { text-align: center; font-size: 20px; margin-bottom: 20px; }
                            .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
                            .info-table td { padding: 6px; border-bottom: 1px dashed #eee; }
                            .info-table td:first-child { font-weight: bold; width: 120px; }
                            .score-table { width: 100%; border-collapse: collapse; font-size: 14px; }
                            .score-table th, .score-table td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
                            .score-table th { background-color: #f9fafb; font-weight: bold; text-align: center; }
                            .total-score { text-align: right; font-size: 16px; font-weight: bold; margin-top: 20px; }
                            .text-center { text-align: center; }
                            .signature { margin-top: 40px; text-align: right; padding-right: 20px; font-size: 14px; }
                            .signature p { margin: 5px 0; }
                            @media print { body { padding: 0; } }
                        </style>
                    </head>
                    <body>
                        <h1>รายงานผลการประเมินนักศึกษาแพทย์</h1>
                        <table class="info-table">
                            <tr><td>วันเวลาที่ประเมิน</td><td>${ev.timestamp}</td></tr>
                            <tr><td>อาจารย์ผู้ประเมิน</td><td>${ev.teacherName}</td></tr>
                            <tr><td>นักศึกษา</td><td>${ev.student.name} (รหัส: ${ev.student.studentId} ปี ${ev.student.year})</td></tr>
                            <tr><td>รายวิชา</td><td>${ev.subject.name} (${ev.form.courseCode})</td></tr>
                            <tr><td>แบบประเมิน</td><td>${ev.form.title}</td></tr>
                        </table>
                `;

                html += `
                    <table class="score-table">
                        <thead>
                            <tr>
                                <th width="8%">ข้อ</th><th width="40%">หัวข้อการประเมิน</th><th width="42%">เกณฑ์ที่ได้</th><th width="10%">คะแนน</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                ev.form.criteria?.forEach((c, idx) => {
                    const score = ev.answers[c.id];
                    const option = c.options.find(o => o.score === score);
                    html += `<tr><td class="text-center">${idx + 1}</td><td>${c.topic}</td><td>${option ? option.label : ''}</td><td class="text-center font-bold">${score}</td></tr>`;
                });
                html += `</tbody></table>`;

                html += `
                        <div class="total-score">คะแนนรวมทั้งหมด: ${ev.totalScore} / ${ev.form.totalScore} คะแนน</div>
                        <div class="signature">
                            <p>ลงชื่อ.............................................................</p>
                            <p>(${ev.teacherName})</p>
                            <p>อาจารย์ผู้ประเมิน</p>
                        </div>
                    </body>
                    </html>
                `;

                printWindow.document.write(html);
                printWindow.document.close();
                setTimeout(() => { printWindow.focus(); printWindow.print(); }, 500);
            };

            return (
                <div className="flex-1 flex flex-col h-full bg-mac-bg">
                    <div className="h-auto md:h-16 py-4 md:py-0 px-4 md:px-8 flex flex-col md:flex-row items-start md:items-center justify-between border-b border-gray-200 bg-white/50 backdrop-blur-sm shrink-0">
                        <h1 className="text-xl md:text-2xl font-bold text-gray-800 tracking-tight mb-2 md:mb-0">ภาพรวมระบบ (Dashboard)</h1>
                        <div className="text-xs md:text-sm font-medium text-gray-500 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100">
                            {new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' })}
                        </div>
                    </div>
                    
                    <div className="flex-1 p-4 md:p-8 overflow-y-auto space-y-6 md:space-y-8 relative">
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                            {stats.map((stat, idx) => (
                                <div key={idx} className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col sm:flex-row items-start sm:items-center space-y-2 sm:space-y-0 sm:space-x-4 md:space-x-5 hover:shadow-md transition-shadow">
                                    <div className={`w-10 h-10 md:w-14 md:h-14 rounded-xl flex items-center justify-center shrink-0 ${stat.bg}`}>
                                        {stat.icon}
                                    </div>
                                    <div>
                                        <div className="text-[10px] md:text-sm font-semibold text-gray-500 mb-0.5 md:mb-1 leading-tight">{stat.label}</div>
                                        <div className="text-lg md:text-2xl font-black text-gray-800">{stat.value}</div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 pb-8">
                            <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6 flex flex-col overflow-hidden">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 md:mb-6 gap-2">
                                    <h2 className="text-base md:text-lg font-bold text-gray-800 flex items-center">
                                        <Icons.Clock className="w-4 h-4 md:w-5 md:h-5 mr-2 text-mac-blue" /> กิจกรรมล่าสุด (ประวัติ)
                                    </h2>
                                    <button className="text-xs md:text-sm font-semibold text-mac-blue hover:underline bg-blue-50 px-3 py-1 rounded-full whitespace-nowrap">ดูทั้งหมด</button>
                                </div>
                                <div className="space-y-3 md:space-y-4 flex-1 overflow-x-auto">
                                    {evaluations.length === 0 ? (
                                        <div className="text-center py-10 text-gray-400 text-sm">ยังไม่มีประวัติการประเมินนักศึกษา</div>
                                    ) : (
                                        <div className="min-w-[400px] md:min-w-0">
                                            {evaluations.map(act => (
                                                <div key={act.id} className="flex items-center p-3 md:p-4 bg-gray-50/50 hover:bg-white rounded-xl transition-colors border border-transparent hover:border-gray-200 hover:shadow-sm group mb-2">
                                                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold shrink-0 shadow-sm border border-blue-200 text-xs md:text-sm">
                                                        {act.teacherName.split(' ')[1]?.charAt(0) || act.teacherName.charAt(0)}
                                                    </div>
                                                    <div className="ml-3 md:ml-4 flex-1 min-w-0">
                                                        <div className="text-xs md:text-sm font-bold text-gray-800 truncate">
                                                            {act.teacherName} <span className="text-gray-500 font-normal">ประเมิน</span> {act.student.name}
                                                        </div>
                                                        <div className="text-[10px] md:text-xs text-gray-500 mt-1 truncate">{act.subject.name || 'ไม่ระบุวิชา'} • {act.timestamp}</div>
                                                    </div>
                                                    <div className="flex items-center space-x-2 md:space-x-4 shrink-0 pl-2">
                                                        <div className="text-right flex-col flex items-end">
                                                            <div className="text-xs md:text-sm font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg border border-green-100 shadow-sm whitespace-nowrap">{act.totalScore} / {act.form.totalScore}</div>
                                                        </div>
                                                        <div className="flex space-x-1 md:space-x-1.5 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => exportToPDF(act)} className="p-1.5 md:p-2 text-red-500 hover:bg-red-50 hover:border-red-200 border border-transparent rounded-lg transition-colors" title="ดาวน์โหลด PDF">
                                                                <Icons.Download width="14" height="14" className="md:w-4 md:h-4" />
                                                            </button>
                                                            <button onClick={() => exportToCSV(act)} className="p-1.5 md:p-2 text-green-600 hover:bg-green-50 hover:border-green-200 border border-transparent rounded-lg transition-colors" title="ดาวน์โหลด Excel">
                                                                <Icons.FileSpreadsheet width="14" height="14" className="md:w-4 md:h-4" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="space-y-4 md:space-y-6">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6">
                                    <h2 className="text-base md:text-lg font-bold text-gray-800 mb-4 md:mb-6 flex items-center">
                                        <Icons.TrendingUp className="w-4 h-4 md:w-5 md:h-5 mr-2 text-mac-blue" /> สถานะข้อมูล
                                    </h2>
                                    <div className="text-sm text-gray-600 mb-2">เชื่อมต่อฐานข้อมูล (Firebase) แล้ว</div>
                                    <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                                        <div className="h-full rounded-full bg-green-500 w-full animate-pulse"></div>
                                    </div>
                                </div>

                                <div className="p-4 md:p-5 bg-gradient-to-br from-yellow-50 to-orange-50 rounded-2xl border border-yellow-100 shadow-sm relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-2 md:p-4 opacity-10">
                                        <Icons.Link className="w-16 h-16 md:w-20 md:h-20" />
                                    </div>
                                    <h3 className="text-xs md:text-sm font-bold text-yellow-800 mb-1.5 md:mb-2 flex items-center">
                                        <span className="mr-2">💡</span> ทิปส์การใช้งาน
                                    </h3>
                                    <p className="text-[10px] md:text-xs text-yellow-700 leading-relaxed font-medium relative z-10">
                                        ข้อมูลทั้งหมดในตอนนี้ถูกบันทึกและซิงค์ผ่าน <b>Firestore Database</b> แบบ Real-time ทันที
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const FormManager = ({ forms, subjects, onEdit, onCreate, onDelete }) => {
            const [filterYear, setFilterYear] = useState('all');
            const [filterSubject, setFilterSubject] = useState('all');
            const [deleteId, setDeleteId] = useState(null);

            const filteredForms = forms.filter(f => {
                const matchYear = filterYear === 'all' || f.year === Number(filterYear);
                const matchSubject = filterSubject === 'all' || f.subjectId === filterSubject;
                return matchYear && matchSubject;
            });

            return (
                <div className="flex-1 flex flex-col h-full bg-mac-bg">
                    <div className="h-auto md:h-16 py-4 md:py-0 px-4 md:px-8 flex flex-col sm:flex-row items-start sm:items-center justify-between border-b border-gray-200 bg-white/50 backdrop-blur-sm gap-3 sm:gap-0">
                        <h1 className="text-xl md:text-2xl font-bold text-gray-800 tracking-tight">คลังแบบประเมิน</h1>
                        <button onClick={onCreate} className="w-full sm:w-auto flex items-center justify-center px-4 py-2 bg-mac-blue text-white rounded-lg text-sm font-medium shadow-md hover:bg-blue-600 transition-all hover:shadow-lg transform hover:-translate-y-0.5">
                            <Icons.Plus /> <span className="ml-2">สร้างแบบประเมินใหม่</span>
                        </button>
                    </div>

                    <div className="flex-1 p-4 md:p-8 overflow-y-auto">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-6">
                            <div className="flex items-center space-x-2 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100 w-full sm:w-auto">
                                <span className="text-xs md:text-sm font-medium text-gray-500 whitespace-nowrap">ชั้นปี:</span>
                                <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="bg-transparent text-xs md:text-sm focus:outline-none font-semibold text-gray-700 w-full">
                                    <option value="all">ทั้งหมด</option>
                                    <option value="4">ปี 4</option>
                                    <option value="5">ปี 5</option>
                                    <option value="6">ปี 6</option>
                                </select>
                            </div>
                            <div className="flex items-center space-x-2 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100 w-full sm:w-auto">
                                <span className="text-xs md:text-sm font-medium text-gray-500 whitespace-nowrap">รายวิชา:</span>
                                <select value={filterSubject} onChange={e => setFilterSubject(e.target.value)} className="bg-transparent text-xs md:text-sm focus:outline-none font-semibold text-gray-700 w-full max-w-[150px] truncate">
                                    <option value="all">ทั้งหมด</option>
                                    {subjects.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                            {filteredForms.map(form => (
                                <div key={form.id} className="bg-white rounded-xl p-4 md:p-5 shadow-sm border border-gray-100 hover:shadow-md transition-shadow flex flex-col h-full relative group">
                                    <div className="flex justify-between items-start mb-3 cursor-pointer" onClick={() => onEdit(form)}>
                                        <div className="flex items-center space-x-2">
                                            <div className="p-1.5 md:p-2 bg-blue-50 text-mac-blue rounded-lg relative">
                                                <Icons.FileText width="16" height="16" />
                                            </div>
                                            <span className="text-[10px] md:text-xs font-bold px-2 py-1 bg-gray-100 text-gray-600 rounded-full">
                                                ปี {form.year}
                                            </span>
                                        </div>
                                    </div>
                                    <h3 className="font-semibold text-gray-800 text-sm md:text-base leading-tight mb-2 flex-1 cursor-pointer" onClick={() => onEdit(form)}>
                                        {form.title}
                                    </h3>
                                    <div className="mt-auto pt-3 border-t border-gray-50">
                                        <div className="flex justify-between items-center text-[10px] md:text-xs text-gray-500">
                                            <span className="truncate pr-2">{subjects.find(s => s.id === form.subjectId)?.name || 'N/A'} {form.courseCode ? `(${form.courseCode})` : ''}</span>
                                            <span className="font-medium bg-green-50 text-green-700 px-1.5 py-0.5 rounded whitespace-nowrap">{form.totalScore} คะแนน</span>
                                        </div>
                                    </div>

                                    <div className="absolute right-2 md:right-4 top-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity flex space-x-1 bg-white/90 backdrop-blur-sm p-1 rounded-lg md:shadow-sm md:border border-gray-100 z-10">
                                        <button 
                                            onClick={(e) => {
                                                e.stopPropagation();
                                                const link = `${window.location.origin}${window.location.pathname}?formId=${form.id}`;
                                                const subjectName = subjects.find(s => s.id === form.subjectId)?.name || '';
                                                const copyText = `📋 ขอเชิญอาจารย์ประเมินนักศึกษา\nเรื่อง: ${form.title}\nสำหรับ: นักศึกษาแพทย์ชั้นปีที่ ${form.year}\nรายวิชา: ${subjectName} ${form.courseCode ? `(${form.courseCode})` : ''}\n\n👉 คลิกลิงก์ด้านล่างเพื่อเข้าสู่หน้าประเมิน:\n${link}`;
                                                const textArea = document.createElement("textarea");
                                                textArea.value = copyText;
                                                document.body.appendChild(textArea);
                                                textArea.select();
                                                document.execCommand("copy");
                                                document.body.removeChild(textArea);
                                                alert('คัดลอกข้อความและลิงก์สำเร็จ! 🎉\nสามารถนำไปวาง (Paste) ในกลุ่ม LINE เพื่อส่งให้อาจารย์ได้เลยครับ');
                                            }} 
                                            className="p-1.5 text-gray-400 hover:text-green-500 transition-colors" title="คัดลอกข้อความส่งให้อาจารย์"
                                        >
                                            <Icons.Link width="14" height="14" />
                                        </button>
                                        <button onClick={(e) => { e.stopPropagation(); onEdit(form); }} className="p-1.5 text-gray-400 hover:text-mac-blue transition-colors" title="แก้ไขแบบประเมิน">
                                            <Icons.Edit width="14" height="14" />
                                        </button>
                                        <button onClick={(e) => { e.stopPropagation(); setDeleteId(form.id); }} className="p-1.5 text-gray-400 hover:text-red-500 transition-colors" title="ลบแบบประเมิน">
                                            <Icons.Trash width="14" height="14" />
                                        </button>
                                    </div>

                                    {deleteId === form.id && (
                                        <div className="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-xl flex flex-col md:flex-row items-center justify-center space-y-2 md:space-y-0 md:space-x-3 z-20 border border-red-100 p-2 text-center">
                                            <span className="text-sm font-medium text-gray-700">ยืนยันลบ?</span>
                                            <div className="flex space-x-2">
                                                <button onClick={(e) => { e.stopPropagation(); onDelete(form.id); setDeleteId(null); }} className="px-3 md:px-4 py-1.5 bg-red-500 hover:bg-red-600 text-white text-xs font-semibold rounded-lg shadow-sm transition-colors">ลบ</button>
                                                <button onClick={(e) => { e.stopPropagation(); setDeleteId(null); }} className="px-3 md:px-4 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-semibold rounded-lg shadow-sm transition-colors">ยกเลิก</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}

                            {filteredForms.length === 0 && (
                                <div className="col-span-full py-10 md:py-16 text-center text-gray-500 bg-white rounded-xl border border-dashed border-gray-200">
                                    <Icons.FileText className="mx-auto h-10 w-10 md:h-12 md:w-12 text-gray-300 mb-3" />
                                    <p className="text-base md:text-lg font-medium">ไม่พบแบบประเมิน</p>
                                    <p className="text-xs md:text-sm mt-1">ลองเปลี่ยนตัวกรอง หรือ สร้างแบบประเมินใหม่</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const SubjectManager = ({ subjects, onSave, onDelete }) => {
            const [view, setView] = useState('list');
            const [formData, setFormData] = useState(null);
            const [deleteId, setDeleteId] = useState(null);

            const handleAdd = () => {
                setFormData({ id: `sub_${Date.now()}`, name: '', years: [] });
                setView('edit');
            };

            const handleEdit = (subject) => {
                setFormData({ ...subject });
                setView('edit');
            };

            const handleDelete = (id) => {
                onDelete(id);
                setDeleteId(null);
            };

            const handleSaveSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
                setView('list');
            };

            const toggleYear = (year) => {
                if (formData.years.includes(year)) {
                    setFormData({ ...formData, years: formData.years.filter(y => y !== year) });
                } else {
                    setFormData({ ...formData, years: [...formData.years, year].sort() });
                }
            };

            if (view === 'edit') {
                return (
                    <div className="flex-1 flex flex-col h-full bg-white/50 backdrop-blur-md">
                        <div className="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-6 bg-white/70">
                            <button onClick={() => setView('list')} className="flex items-center text-gray-500 hover:text-gray-800 transition">
                                <Icons.ChevronLeft />
                                <span className="ml-1 text-sm font-medium">ย้อนกลับ</span>
                            </button>
                            <h2 className="text-base md:text-lg font-bold text-gray-800">
                                {subjects.find(s => s.id === formData?.id) ? 'แก้ไขรายวิชา' : 'เพิ่มรายวิชาใหม่'}
                            </h2>
                            <button onClick={handleSaveSubmit} disabled={!formData.name || formData.years.length === 0} className="px-3 md:px-4 py-1.5 bg-mac-blue text-white rounded-md text-sm font-medium shadow-sm hover:bg-blue-600 transition disabled:opacity-50 disabled:cursor-not-allowed">
                                บันทึก
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-2xl mx-auto bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-100">
                                <form onSubmit={handleSaveSubmit} className="space-y-4 md:space-y-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-600 mb-1.5 md:mb-2">รหัสอ้างอิงรายวิชา (ID)</label>
                                        <input type="text" value={formData.id} disabled className="w-full px-3 py-2 border border-gray-200 bg-gray-50 rounded-md text-xs md:text-sm text-gray-500 cursor-not-allowed" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-600 mb-1.5 md:mb-2">ชื่อรายวิชา <span className="text-red-500">*</span></label>
                                        <input type="text" required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm" placeholder="เช่น กุมารเวชศาสตร์" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-600 mb-2 md:mb-3">เปิดสอนสำหรับชั้นปี (เลือกได้มากกว่า 1) <span className="text-red-500">*</span></label>
                                        <div className="flex flex-wrap gap-3 md:space-x-4 md:gap-0">
                                            {[4, 5, 6].map(year => (
                                                <label key={year} className={`flex-1 min-w-[80px] flex items-center justify-center px-3 md:px-4 py-2 border rounded-lg cursor-pointer transition-all text-xs md:text-sm ${formData.years.includes(year) ? 'bg-blue-50 border-mac-blue text-mac-blue font-bold shadow-sm' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
                                                    <input type="checkbox" className="hidden" checked={formData.years.includes(year)} onChange={() => toggleYear(year)} />
                                                    ชั้นปี {year}
                                                </label>
                                            ))}
                                        </div>
                                        {formData.years.length === 0 && <p className="text-xs text-red-500 mt-2">กรุณาเลือกชั้นปีอย่างน้อย 1 ชั้นปี</p>}
                                    </div>
                                    <button type="submit" className="hidden"></button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-1 flex flex-col h-full bg-mac-bg">
                    <div className="h-auto md:h-16 py-4 md:py-0 px-4 md:px-8 flex flex-col sm:flex-row items-start sm:items-center justify-between border-b border-gray-200 bg-white/50 backdrop-blur-sm gap-3 sm:gap-0">
                        <h1 className="text-xl md:text-2xl font-bold text-gray-800 tracking-tight">จัดการรายวิชา</h1>
                        <button onClick={handleAdd} className="w-full sm:w-auto flex items-center justify-center px-4 py-2 bg-mac-blue text-white rounded-lg text-sm font-medium shadow-md hover:bg-blue-600 transition-all hover:shadow-lg transform hover:-translate-y-0.5">
                            <Icons.Plus /> <span className="ml-2">เพิ่มรายวิชา</span>
                        </button>
                    </div>
                    <div className="flex-1 p-4 md:p-8 overflow-y-auto">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            {subjects.map(subject => (
                                <div key={subject.id} className="bg-white p-4 md:p-5 rounded-xl shadow-sm border border-gray-100 relative group hover:shadow-md transition-shadow">
                                    <div className="flex items-start justify-between">
                                        <div className="flex items-center space-x-3">
                                            <div className="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center text-green-600 shrink-0">
                                                <Icons.BookOpen className="w-5 h-5" />
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-gray-800 text-sm md:text-base">{subject.name}</h3>
                                                <div className="flex flex-wrap gap-1 mt-1.5">
                                                    {subject.years.map(y => (
                                                        <span key={y} className="text-[10px] font-bold px-2 py-0.5 bg-gray-100 text-gray-500 rounded-full">ปี {y}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity flex space-x-1 bg-white/90 backdrop-blur-sm p-1 rounded-lg md:shadow-sm md:border border-gray-100">
                                        <button onClick={() => handleEdit(subject)} className="p-1.5 text-gray-500 hover:text-mac-blue rounded-md hover:bg-blue-50 transition-colors">
                                            <Icons.Edit width="16" height="16" />
                                        </button>
                                        <button onClick={() => setDeleteId(subject.id)} className="p-1.5 text-gray-500 hover:text-red-500 rounded-md hover:bg-red-50 transition-colors">
                                            <Icons.Trash width="16" height="16" />
                                        </button>
                                    </div>

                                    {deleteId === subject.id && (
                                        <div className="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-xl flex flex-col md:flex-row items-center justify-center space-y-2 md:space-y-0 md:space-x-3 z-10 border border-red-100 p-2 text-center">
                                            <span className="text-sm font-medium text-gray-700">ยืนยันลบ?</span>
                                            <div className="flex space-x-2">
                                                <button onClick={() => handleDelete(subject.id)} className="px-3 md:px-4 py-1.5 bg-red-500 hover:bg-red-600 text-white text-xs font-semibold rounded-lg shadow-sm transition-colors">ลบ</button>
                                                <button onClick={() => setDeleteId(null)} className="px-3 md:px-4 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-semibold rounded-lg shadow-sm transition-colors">ยกเลิก</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                            {subjects.length === 0 && (
                                <div className="col-span-full py-10 md:py-12 text-center text-gray-500 bg-white rounded-xl border border-dashed border-gray-200 text-sm md:text-base">
                                    ไม่พบข้อมูลรายวิชาในฐานข้อมูล
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const StudentManager = ({ students, onSave, onDelete }) => {
            const [view, setView] = useState('list');
            const [formData, setFormData] = useState(null);
            const [filterYear, setFilterYear] = useState('all');
            const [deleteId, setDeleteId] = useState(null);

            const filteredStudents = students.filter(s => filterYear === 'all' || s.year === Number(filterYear));

            const handleAdd = () => {
                setFormData({ id: `s_${Date.now()}`, studentId: '', name: '', year: 4, imageUrl: '' });
                setView('edit');
            };

            const handleEdit = (student) => {
                setFormData({ ...student });
                setView('edit');
            };

            const handleDelete = (id) => {
                onDelete(id);
                setDeleteId(null);
            };

            const handleSaveSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
                setView('list');
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    try {
                        const base64Compressed = await resizeImage(file, 400, 400); // ย่อขนาดเพื่อไม่ให้เกิน Limit Firebase
                        setFormData({ ...formData, imageUrl: base64Compressed });
                    } catch (err) {
                        alert("เกิดข้อผิดพลาดในการประมวลผลรูปภาพ");
                    }
                }
            };

            if (view === 'edit') {
                return (
                    <div className="flex-1 flex flex-col h-full bg-white/50 backdrop-blur-md">
                        <div className="h-14 border-b border-gray-200 flex items-center justify-between px-4 md:px-6 bg-white/70">
                            <button onClick={() => setView('list')} className="flex items-center text-gray-500 hover:text-gray-800 transition">
                                <Icons.ChevronLeft />
                                <span className="ml-1 text-sm font-medium">ย้อนกลับ</span>
                            </button>
                            <h2 className="text-base md:text-lg font-bold text-gray-800 truncate px-2 text-center">
                                {students.find(s => s.id === formData.id) ? 'แก้ไขข้อมูลนักศึกษา' : 'เพิ่มนักศึกษาใหม่'}
                            </h2>
                            <button onClick={handleSaveSubmit} className="px-3 md:px-4 py-1.5 bg-mac-blue text-white rounded-md text-sm font-medium shadow-sm hover:bg-blue-600 transition">
                                บันทึก
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-2xl mx-auto bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-100">
                                <form onSubmit={handleSaveSubmit} className="space-y-4">
                                    <div className="flex flex-col sm:flex-row items-center sm:space-x-6 mb-6 gap-4 sm:gap-0">
                                        <div className="w-24 h-24 md:w-28 md:h-28 bg-gray-100 rounded-2xl overflow-hidden border-2 border-gray-200 flex items-center justify-center shrink-0 relative group shadow-sm">
                                            {formData.imageUrl ? (
                                                <img src={formData.imageUrl} alt="preview" className="w-full h-full object-cover" />
                                            ) : (
                                                <Icons.Users className="w-8 h-8 md:w-10 md:h-10 text-gray-400" />
                                            )}
                                            
                                            <label className="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex flex-col items-center justify-center cursor-pointer transition-all">
                                                <Icons.Upload className="text-white w-5 h-5" />
                                                <span className="text-[10px] text-white mt-1 font-medium">เปลี่ยนรูป</span>
                                                <input type="file" accept="image/jpeg, image/png, image/webp" onChange={handleImageUpload} className="hidden" />
                                            </label>
                                        </div>
                                        <div className="flex-1 w-full sm:w-auto text-center sm:text-left">
                                            <label className="block text-sm font-medium text-gray-600 mb-2">รูปภาพนักศึกษา</label>
                                            <div className="flex flex-col sm:flex-row items-center space-y-2 sm:space-y-0 sm:space-x-3">
                                                <label className="flex items-center justify-center w-full sm:w-auto px-4 py-2 bg-white border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors">
                                                    <Icons.Upload width="16" height="16" />
                                                    <span className="ml-2">อัปโหลดจากเครื่อง</span>
                                                    <input type="file" accept="image/jpeg, image/png, image/webp" onChange={handleImageUpload} className="hidden" />
                                                </label>
                                                {formData.imageUrl && (
                                                    <button type="button" onClick={() => setFormData({...formData, imageUrl: ''})} className="text-sm text-red-500 hover:text-red-700 font-medium px-3 py-2 rounded hover:bg-red-50 transition-colors">
                                                        ลบรูปภาพ
                                                    </button>
                                                )}
                                            </div>
                                            <p className="text-[10px] md:text-xs text-gray-400 mt-2">ภาพจะถูกย่อขนาดอัตโนมัติเพื่อประหยัดพื้นที่ฐานข้อมูล</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-600 mb-1">รหัสนักศึกษา</label>
                                            <input type="text" required value={formData.studentId} onChange={e => setFormData({...formData, studentId: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-600 mb-1">ชั้นปี</label>
                                            <select value={formData.year} onChange={e => setFormData({...formData, year: Number(e.target.value)})} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm bg-white">
                                                <option value={4}>ปี 4</option>
                                                <option value={5}>ปี 5</option>
                                                <option value={6}>ปี 6</option>
                                            </select>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-medium text-gray-600 mb-1">ชื่อ-นามสกุล</label>
                                            <input type="text" required value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-sm" placeholder="นศพ. ..." />
                                        </div>
                                    </div>
                                    <button type="submit" className="hidden"></button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-1 flex flex-col h-full bg-mac-bg">
                    <div className="h-auto md:h-16 py-4 md:py-0 px-4 md:px-8 flex flex-col sm:flex-row items-start sm:items-center justify-between border-b border-gray-200 bg-white/50 backdrop-blur-sm gap-3 sm:gap-0">
                        <h1 className="text-xl md:text-2xl font-bold text-gray-800 tracking-tight">จัดการข้อมูลนักศึกษา</h1>
                        <button onClick={handleAdd} className="w-full sm:w-auto flex items-center justify-center px-4 py-2 bg-mac-blue text-white rounded-lg text-sm font-medium shadow-md hover:bg-blue-600 transition-all hover:shadow-lg transform hover:-translate-y-0.5">
                            <Icons.Plus /> <span className="ml-2">เพิ่มนักศึกษา</span>
                        </button>
                    </div>
                    <div className="flex-1 p-4 md:p-8 overflow-y-auto">
                        <div className="mb-4 md:mb-6 flex items-center space-x-2 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-gray-100 w-full sm:w-fit">
                            <span className="text-xs md:text-sm font-medium text-gray-500 whitespace-nowrap">ชั้นปี:</span>
                            <select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="bg-transparent text-xs md:text-sm focus:outline-none font-semibold text-gray-700 w-full">
                                <option value="all">ทั้งหมด</option>
                                <option value="4">ปี 4</option>
                                <option value="5">ปี 5</option>
                                <option value="6">ปี 6</option>
                            </select>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
