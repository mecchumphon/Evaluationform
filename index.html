                                                    onClick={() => removeCriterion(cIdx)}
                                                    className="absolute top-4 right-4 text-gray-400 hover:text-red-500"
                                                >
                                                    <Icons.X width="18" height="18" />
                                                </button>

                                                <div className="max-w-[90%]">
                                                    <label className="block text-xs font-medium text-gray-600 mb-1">หัวข้อ {cIdx + 1}</label>
                                                    <input 
                                                        type="text" 
                                                        value={c.topic} 
                                                        onChange={(e) => updateCriterion(cIdx, 'topic', e.target.value)}
                                                        placeholder="เช่น การสัมภาษณ์ประวัติ หรือ ทักษะกระบวนการสื่อสาร" 
                                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none text-xs font-semibold"
                                                    />
                                                </div>

                                                <div className="space-y-2">
                                                    <div className="flex items-center justify-between">
                                                        <span className="text-xs font-bold text-gray-500">ตัวเลือกเกณฑ์คะแนน (Rating Options)</span>
                                                        <button 
                                                            type="button" 
                                                            onClick={() => addOption(cIdx)}
                                                            className="text-xs text-mac-blue hover:underline flex items-center"
                                                        >
                                                            <Icons.Plus width="12" height="12" className="mr-0.5" /> เพิ่มตัวเลือกคะแนน
                                                        </button>
                                                    </div>

                                                    <div className="space-y-2">
                                                        {c.options.map((opt, oIdx) => (
                                                            <div key={oIdx} className="flex gap-2 items-start bg-gray-50 p-2 rounded-lg">
                                                                <div className="w-16">
                                                                    <label className="block text-[10px] text-gray-400">คะแนน</label>
                                                                    <input 
                                                                        type="number" 
                                                                        value={opt.score}
                                                                        onChange={(e) => updateOption(cIdx, oIdx, 'score', Number(e.target.value))}
                                                                        className="w-full px-2 py-1 border rounded text-xs text-center"
                                                                    />
                                                                </div>
                                                                <div className="flex-1">
                                                                    <label className="block text-[10px] text-gray-400">คำอธิบายคุณภาพเกณฑ์ (Rubric)</label>
                                                                    <input 
                                                                        type="text" 
                                                                        value={opt.label}
                                                                        onChange={(e) => updateOption(cIdx, oIdx, 'label', e.target.value)}
                                                                        className="w-full px-2 py-1 border rounded text-xs"
                                                                        placeholder="คำอธิบายเกณฑ์ที่จะได้รับคะแนนนี้..."
                                                                    />
                                                                </div>
                                                                {c.options.length > 1 && (
                                                                    <button 
                                                                        type="button" 
                                                                        onClick={() => removeOption(cIdx, oIdx)}
                                                                        className="mt-4 p-1 text-gray-400 hover:text-red-500"
                                                                    >
                                                                        <Icons.X width="14" height="14" />
                                                                    </button>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Component: SubjectsView ---
        const SubjectsView = ({ subjectList, onSaveSubject, onDeleteSubject }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [newSub, setNewSub] = useState({ code: '', name: '', dept: '' });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!newSub.code || !newSub.name) return;
                onSaveSubject({
                    ...newSub,
                    id: `sub_${Date.now()}`
                });
                setNewSub({ code: '', name: '', dept: '' });
                setIsAdding(false);
            };

            return (
                <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-white/40">
                    <div className="max-w-4xl mx-auto space-y-6">
                        <div className="flex items-center justify-between">
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">จัดการรายวิชานักศึกษาแพทย์</h2>
                                <p className="text-sm text-gray-500">รายวิชาแพทย์แผนกต่างๆ สำหรับกลุ่มงานแพทยศาสตรศึกษา</p>
                            </div>
                            <button 
                                onClick={() => setIsAdding(!isAdding)}
                                className="flex items-center px-4 py-2 bg-mac-blue text-white rounded-lg text-xs font-semibold shadow hover:bg-blue-600 transition"
                            >
                                {isAdding ? "ปิดฟอร์ม" : "เพิ่มรายวิชา"}
                            </button>
                        </div>

                        {isAdding && (
                            <form onSubmit={handleSubmit} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                                <div>
                                    <label className="block text-xs text-gray-500 mb-1">รหัสวิชา</label>
                                    <input 
                                        type="text" 
                                        required 
                                        placeholder="เช่น พ.401"
                                        value={newSub.code}
                                        onChange={(e) => setNewSub({...newSub, code: e.target.value})}
                                        className="w-full p-2 border rounded text-xs"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs text-gray-500 mb-1">ชื่อวิชา</label>
                                    <input 
                                        type="text" 
                                        required 
                                        placeholder="เช่น กุมารเวชศาสตร์ 1"
                                        value={newSub.name}
                                        onChange={(e) => setNewSub({...newSub, name: e.target.value})}
                                        className="w-full p-2 border rounded text-xs"
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <div className="flex-1">
                                        <label className="block text-xs text-gray-500 mb-1">กลุ่มงาน/กอง</label>
                                        <input 
                                            type="text" 
                                            placeholder="กุมารเวชกรรม"
                                            value={newSub.dept}
                                            onChange={(e) => setNewSub({...newSub, dept: e.target.value})}
                                            className="w-full p-2 border rounded text-xs"
                                        />
                                    </div>
                                    <button 
                                        type="submit"
                                        className="px-4 py-2 bg-emerald-500 text-white rounded text-xs font-semibold hover:bg-emerald-600 transition shrink-0 h-9"
                                    >
                                        บันทึก
                                    </button>
                                </div>
                            </form>
                        )}

                        <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-gray-50 border-b text-xs font-bold text-gray-600">
                                        <th className="p-4">รหัสวิชา</th>
                                        <th className="p-4">ชื่อรายวิชา</th>
                                        <th className="p-4">สาขาวิชา/แผนก</th>
                                        <th className="p-4 text-right">การจัดการ</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y text-xs text-gray-700">
                                    {subjectList.map(s => (
                                        <tr key={s.id} className="hover:bg-gray-50">
                                            <td className="p-4 font-bold text-mac-blue">{s.code}</td>
                                            <td className="p-4 font-semibold">{s.name}</td>
                                            <td className="p-4">{s.dept || "-"}</td>
                                            <td className="p-4 text-right">
                                                <button 
                                                    onClick={() => {
                                                        if(confirm(`ต้องการลบวิชา "${s.code} ${s.name}"?`)){
                                                            onDeleteSubject(s.id);
                                                        }
                                                    }}
                                                    className="p-1.5 text-gray-400 hover:text-red-500 rounded"
                                                >
                                                    <Icons.Trash width="16" height="16" />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {subjectList.length === 0 && (
                                        <tr>
                                            <td colSpan="4" className="p-8 text-center text-gray-400">ยังไม่มีข้อมูลรายวิชาแพทย์</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Component: StudentsView ---
        const StudentsView = ({ studentList, onSaveStudent, onDeleteStudent, evalList, formList }) => {
            const [isAdding, setIsAdding] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedReportStudent, setSelectedReportStudent] = useState(null);
            
            // Filters State
            const [selectedAcademicYearFilter, setSelectedAcademicYearFilter] = useState('all');
            const [selectedClassYearFilter, setSelectedClassYearFilter] = useState('all');

            // Default Year 2569 since Gregorian is 2026
            const currentThaiYear = useMemo(() => new Date().getFullYear() + 543, []);

            const [newStudent, setNewStudent] = useState({
                prefix: 'นศพ.',
                firstName: '',
                lastName: '',
                studentId: '',
                year: 4,
                academicYear: currentThaiYear,
                avatar: ''
            });

            // Extract all unique Academic Years from registered students
            const uniqueAcademicYears = useMemo(() => {
                const years = studentList.map(s => s.academicYear).filter(Boolean);
                const combined = [currentThaiYear, ...years];
                return [...new Set(combined)].sort((a, b) => b - a);
            }, [studentList, currentThaiYear]);

            const handleStudentPhotoUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const compressed = await resizeImage(file, 200, 200);
                    setNewStudent(prev => ({ ...prev, avatar: compressed }));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!newStudent.firstName || !newStudent.lastName) return;
                onSaveStudent({
                    ...newStudent,
                    id: `student_${Date.now()}`
                });
                setNewStudent({ 
                    prefix: 'นศพ.', 
                    firstName: '', 
                    lastName: '', 
                    studentId: '', 
                    year: 4, 
                    academicYear: currentThaiYear, 
                    avatar: '' 
                });
                setIsAdding(false);
            };

            const filteredStudents = useMemo(() => {
                return studentList.filter(s => {
                    const first = (s.firstName || '').toLowerCase();
                    const last = (s.lastName || '').toLowerCase();
                    const sid = (s.studentId || '').toLowerCase();
                    const term = searchTerm.toLowerCase();
                    
                    const matchSearch = first.includes(term) || last.includes(term) || sid.includes(term);
                    const matchAcademic = selectedAcademicYearFilter === 'all' || String(s.academicYear) === String(selectedAcademicYearFilter);
                    const matchClass = selectedClassYearFilter === 'all' || Number(s.year) === Number(selectedClassYearFilter);

                    return matchSearch && matchAcademic && matchClass;
                });
            }, [studentList, searchTerm, selectedAcademicYearFilter, selectedClassYearFilter]);

            // Calculate overall progress card
            const renderReportCard = (student) => {
                const sEvals = evalList.filter(ev => ev.studentId === student.id);
                return (
                    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[80vh]">
                            <div className="p-5 border-b flex items-center justify-between bg-gray-50">
                                <div className="flex items-center space-x-4">
                                    {student.avatar ? (
                                        <img src={student.avatar} alt="Avatar" className="w-20 h-20 rounded-xl object-cover border-2 border-white shadow-md shrink-0" />
                                    ) : (
                                        <div className="w-20 h-20 rounded-xl bg-blue-100 flex items-center justify-center font-bold text-mac-blue text-3xl shrink-0">
                                            {(student.firstName || 'N').charAt(0)}
                                        </div>
                                    )}
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-sm">รายงานผลการประเมินรายบุคคล</h3>
                                        <p className="text-xs text-gray-500">
                                            {student.prefix || ''}{student.firstName || ''} {student.lastName || ''} 
                                            <span className="ml-2 px-1.5 py-0.5 bg-blue-100 text-mac-blue text-[10px] rounded font-semibold">ปีการศึกษา {student.academicYear || '-'}</span>
                                        </p>
                                        <p className="text-[11px] text-gray-400 mt-0.5">ชั้นปีคลินิกที่ {student.year}</p>
                                    </div>
                                </div>
                                <button onClick={() => setSelectedReportStudent(null)} className="p-1 hover:bg-gray-200 rounded">
                                    <Icons.X />
                                </button>
                            </div>
                            <div className="p-6 overflow-y-auto space-y-6 flex-1 text-xs">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-4 bg-blue-50/50 border rounded-lg text-center">
                                        <div className="text-gray-500 mb-1">การประเมินทั้งหมด</div>
                                        <div className="text-2xl font-bold text-mac-blue">{sEvals.length} ครั้ง</div>
                                    </div>
                                    <div className="p-4 bg-emerald-50/50 border rounded-lg text-center">
                                        <div className="text-gray-500 mb-1">คะแนนเฉลี่ยรวม</div>
                                        <div className="text-2xl font-bold text-emerald-600">
                                            {sEvals.length > 0 
                                                ? (sEvals.reduce((sum, ev) => sum + (ev.scores?.totalScore || 0), 0) / sEvals.length).toFixed(1) 
                                                : "0.0"
                                            }
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <h4 className="font-bold text-gray-700">ประวัติผลการเรียนรู้รายครั้ง</h4>
                                    <div className="space-y-2">
                                        {sEvals.map(ev => {
                                            const form = formList.find(f => f.id === ev.formId);
                                            return (
                                                <div key={ev.id} className="p-3 bg-gray-50 border rounded-lg flex justify-between items-center">
                                                    <div>
                                                        <div className="font-bold text-gray-800">{form?.title || "ไม่ระบุประเภทฟอร์ม"}</div>
                                                        <div className="text-[10px] text-gray-400">ประเมินโดย: {ev.evaluatorName || ''} ({ev.createdAt || ''})</div>
                                                        {ev.comments && <p className="text-gray-500 italic mt-1 font-medium">"{ev.comments}"</p>}
                                                    </div>
                                                    <div className="text-right font-bold text-mac-blue">
                                                        {ev.scores?.totalScore || 0} คะแนน
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {sEvals.length === 0 && (
                                            <div className="text-center py-6 text-gray-400">ยังไม่ได้รับการประเมินในเทอมนี้</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-white/40">
                    <div className="max-w-4xl mx-auto space-y-6">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">นักศึกษาแพทย์</h2>
                                <p className="text-sm text-gray-500">รายชื่อนักศึกษาแพทย์ชั้นคลินิก และประวัติติดตามผลประเมินย้อนหลัง</p>
                            </div>
                            <button 
                                onClick={() => setIsAdding(!isAdding)}
                                className="flex items-center px-4 py-2 bg-mac-blue text-white rounded-lg text-xs font-semibold shadow hover:bg-blue-600 transition self-start"
                            >
                                {isAdding ? "ปิดฟอร์ม" : "ลงทะเบียนนักศึกษาใหม่"}
                            </button>
                        </div>

                        {isAdding && (
                            <form onSubmit={handleSubmit} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                                    {/* Photo Upload Container */}
                                    <div className="flex flex-col items-center justify-center p-3 border rounded-xl bg-gray-50 h-full min-h-[140px] shadow-sm">
                                        <label className="block text-[10px] text-gray-400 mb-1.5 font-semibold text-center">รูปถ่ายนักศึกษา</label>
                                        <div className="relative w-24 h-24 bg-gray-200 rounded-xl overflow-hidden flex items-center justify-center border shadow-inner">
                                            {newStudent.avatar ? (
                                                <img src={newStudent.avatar} alt="Preview" className="w-full h-full object-cover" />
                                            ) : (
                                                <Icons.Camera className="text-gray-400" width="32" height="32" />
                                            )}
                                        </div>
                                        <input 
                                            type="file" 
                                            accept="image/*" 
                                            onChange={handleStudentPhotoUpload} 
                                            id="student-photo-file" 
                                            className="hidden" 
                                        />
                                        <label 
                                            htmlFor="student-photo-file" 
                                            className="mt-2.5 px-3 py-1 bg-gray-200 hover:bg-gray-300 rounded-md text-[10px] cursor-pointer font-bold transition shadow-sm"
                                        >
                                            เลือกรูปภาพ
                                        </label>
                                    </div>
                                    
                                    <div className="space-y-3 col-span-1 md:col-span-3">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">คำนำหน้า</label>
                                                <input 
                                                    type="text" 
                                                    value={newStudent.prefix}
                                                    onChange={(e) => setNewStudent({...newStudent, prefix: e.target.value})}
                                                    className="w-full p-2 border rounded text-xs"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">ชื่อจริง <span className="text-red-500">*</span></label>
                                                <input 
                                                    type="text" 
                                                    required 
                                                    placeholder="เช่น สมชาย"
                                                    value={newStudent.firstName}
                                                    onChange={(e) => setNewStudent({...newStudent, firstName: e.target.value})}
                                                    className="w-full p-2 border rounded text-xs"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">นามสกุล <span className="text-red-500">*</span></label>
                                                <input 
                                                    type="text" 
                                                    required 
                                                    placeholder="ใจดี"
                                                    value={newStudent.lastName}
                                                    onChange={(e) => setNewStudent({...newStudent, lastName: e.target.value})}
                                                    className="w-full p-2 border rounded text-xs"
                                                />
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">รหัสประจำตัว</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="เช่น 640101"
                                                    value={newStudent.studentId}
                                                    onChange={(e) => setNewStudent({...newStudent, studentId: e.target.value})}
                                                    className="w-full p-2 border rounded text-xs"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">ปีการศึกษาที่ลงทะเบียน</label>
                                                <input 
                                                    type="number" 
                                                    placeholder="เช่น 2569"
                                                    value={newStudent.academicYear}
                                                    onChange={(e) => setNewStudent({...newStudent, academicYear: Number(e.target.value)})}
                                                    className="w-full p-2 border rounded text-xs"
                                                    min="2500"
                                                    max="2700"
                                                    required
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-xs text-gray-500 mb-1">ชั้นปี</label>
                                                <select 
                                                    value={newStudent.year}
                                                    onChange={(e) => setNewStudent({...newStudent, year: Number(e.target.value)})}
                                                    className="w-full p-2 border rounded text-xs bg-white"
                                                >
                                                    <option value={4}>ปี 4</option>
                                                    <option value={5}>ปี 5</option>
                                                    <option value={6}>ปี 6</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex justify-end pt-2 border-t">
                                    <button 
                                        type="submit"
                                        className="px-5 py-1.5 bg-emerald-500 text-white rounded-lg text-xs font-semibold hover:bg-emerald-600 transition shadow-sm"
                                    >
                                        ลงทะเบียนและบันทึก
                                    </button>
                                </div>
                            </form>
                        )}

                        {/* Search and Advanced Filter Panels */}
                        <div className="bg-white p-4 rounded-xl border space-y-3 shadow-sm">
                            <div className="flex items-center bg-gray-50 px-3 py-2 rounded-lg border">
                                <Icons.Search className="text-gray-400 mr-2 shrink-0" />
                                <input 
                                    type="text" 
                                    placeholder="ค้นหาด้วย ชื่อ นามสกุล หรือรหัสนักศึกษา..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full border-0 focus:ring-0 text-xs bg-transparent outline-none text-gray-700"
                                />
                            </div>

                            <div className="flex flex-wrap gap-4 items-center text-xs">
                                <div className="flex items-center space-x-2">
                                    <span className="text-gray-500 font-medium">กรองปีการศึกษา:</span>
                                    <select 
                                        value={selectedAcademicYearFilter}
                                        onChange={(e) => setSelectedAcademicYearFilter(e.target.value)}
                                        className="border rounded p-1.5 bg-gray-50 outline-none text-gray-700"
                                    >
                                        <option value="all">ทั้งหมด</option>
                                        {uniqueAcademicYears.map(yr => (
                                            <option key={yr} value={yr}>ปีการศึกษา {yr}</option>
                                        ))}
                                    </select>
                                </div>

                                <div className="flex items-center space-x-2">
                                    <span className="text-gray-500 font-medium">กรองชั้นปี:</span>
                                    <select 
                                        value={selectedClassYearFilter}
                                        onChange={(e) => setSelectedClassYearFilter(e.target.value)}
                                        className="border rounded p-1.5 bg-gray-50 outline-none text-gray-700"
                                    >
                                        <option value="all">ทั้งหมด</option>
                                        <option value={4}>ชั้นปีที่ 4</option>
                                        <option value={5}>ชั้นปีที่ 5</option>
                                        <option value={6}>ชั้นปีที่ 6</option>
                                    </select>
                                </div>

                                <div className="ml-auto text-gray-400 text-[11px]">
                                    พบนศพ. ทั้งหมด <strong className="text-gray-700 font-bold">{filteredStudents.length}</strong> คน
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-gray-50 border-b text-xs font-bold text-gray-600">
                                        <th className="p-4 w-24">รูปถ่าย</th>
                                        <th className="p-4">รหัสประจำตัว</th>
                                        <th className="p-4">ชื่อ - นามสกุล</th>
                                        <th className="p-4">ปีการศึกษา / ชั้นปี</th>
                                        <th className="p-4 text-center">ดูผลการเรียน</th>
                                        <th className="p-4 text-right">การจัดการ</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y text-xs text-gray-700">
                                    {filteredStudents.map(s => (
                                        <tr key={s.id} className="hover:bg-gray-50">
                                            <td className="p-4">
                                                {s.avatar ? (
                                                    <img src={s.avatar} alt="Avatar" className="w-16 h-16 rounded-xl object-cover border shadow-sm" />
                                                ) : (
                                                    <div className="w-16 h-16 rounded-xl bg-blue-50 border flex items-center justify-center font-bold text-mac-blue text-lg shadow-sm">
                                                        {(s.firstName || 'N').charAt(0)}
                                                    </div>
                                                )}
                                            </td>
                                            <td className="p-4 font-mono text-gray-500">{s.studentId || "-"}</td>
                                            <td className="p-4 font-semibold text-gray-800">{s.prefix || ''}{s.firstName || ''} {s.lastName || ''}</td>
                                            <td className="p-4">
                                                <div className="font-semibold text-gray-700">ปีการศึกษา {s.academicYear || 'ไม่ระบุ'}</div>
                                                <div className="text-[11px] text-gray-400">ชั้นปีคลินิกที่ {s.year}</div>
                                            </td>
                                            <td className="p-4 text-center">
                                                <button 
                                                    onClick={() => setSelectedReportStudent(s)}
                                                    className="px-2.5 py-1 text-[11px] font-bold border rounded bg-gray-50 hover:bg-mac-blue hover:text-white hover:border-mac-blue transition-colors text-gray-600"
                                                >
                                                    ประวัติประเมิน
                                                </button>
                                            </td>
                                            <td className="p-4 text-right">
                                                <button 
                                                    onClick={() => {
                                                        if(confirm(`ต้องการลบนักศึกษา "${s.firstName || ''} ${s.lastName || ''}" ยืนยันใช่หรือไม่?`)){
                                                            onDeleteStudent(s.id);
                                                        }
                                                    }}
                                                    className="p-1.5 text-gray-400 hover:text-red-500 rounded"
                                                >
                                                    <Icons.Trash width="16" height="16" />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredStudents.length === 0 && (
                                        <tr>
                                            <td colSpan="6" className="p-8 text-center text-gray-400">ไม่พบรายชื่อนักศึกษาแพทย์ที่ตรงตามเงื่อนไขตัวกรอง</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {selectedReportStudent && renderReportCard(selectedReportStudent)}
                </div>
            );
        };

        // --- Component: SettingsView ---
        const SettingsView = () => {
            return (
                <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-white/40">
                    <div className="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-6">
                        <div>
                            <h2 className="text-xl font-bold text-gray-800">ตั้งค่าระบบ (Settings)</h2>
                            <p className="text-xs text-gray-500">ข้อมูลกำหนดสิทธิ์และความมั่นคงของระบบประเมินผลสัมฤทธิ์</p>
                        </div>
                        
                        <div className="space-y-4">
                            <div className="p-4 bg-gray-50 rounded-lg flex items-center justify-between">
                                <div>
                                    <div className="text-xs font-bold text-gray-700">เชื่อมต่อคลังข้อมูลสมานฉันท์ (Firebase DB)</div>
                                    <p className="text-[11px] text-gray-400">สถานะการส่งออกและนำข้อมูลภายนอกแบบ Live-Time Sync</p>
                                </div>
                                <span className="px-2.5 py-0.5 bg-green-100 text-green-700 rounded-full font-bold text-[10px]">Active</span>
                            </div>

                            <div className="p-4 bg-gray-50 rounded-lg flex items-center justify-between">
                                <div>
                                    <div className="text-xs font-bold text-gray-700">การเข้าถึงฟังก์ชันวิเคราะห์กล้องวิชั่น (AI Vision API)</div>
                                    <p className="text-[11px] text-gray-400">วิเคราะห์รูปภาพเกณฑ์คะแนนด้วย Gemini-2.5-Flash</p>
                                </div>
                                <span className="px-2.5 py-0.5 bg-green-100 text-green-700 rounded-full font-bold text-[10px]">พร้อมใช้งาน</span>
                            </div>

                            <div className="pt-4 border-t space-y-2">
                                <h3 className="text-xs font-bold text-gray-700">วิสัยทัศน์พันธกิจ</h3>
                                <p className="text-xs text-gray-500 leading-relaxed">
                                    เป็นศูนย์แพทยศาสตรศึกษาชั้นนำที่ผลิตบัณฑิตแพทย์ที่มีคุณภาพ มาตรฐานระดับสากล 
                                    เปี่ยมไปด้วยจรรยาบรรณวิชาชีพและมุ่งมั่นรับผิดชอบช่วยเหลือสังคมของเขตภาคใต้ตอนบน
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Core Application Entry Point ---
        const App = () => {
            const [activeMenu, setActiveMenu] = useState('overview');
            const [isFirebaseReady, setIsFirebaseReady] = useState(false);
            const [urlFormId, setUrlFormId] = useState(null);

            const [loggedInUser, setLoggedInUser] = useState(null);
            const [userRole, setUserRole] = useState(null); // 'ADMIN', 'STAFF', 'STUDENT'
            const [loginUsername, setLoginUsername] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [formList, setFormList] = useState([]);
            const [studentList, setStudentList] = useState([]);
            const [subjectList, setSubjectList] = useState([]);
            const [evalList, setEvalList] = useState([]);

            // Load session or URL params
            useEffect(() => {
                const handleFirebaseReady = () => setIsFirebaseReady(true);
                if (window.firebaseDB) {
                    setIsFirebaseReady(true);
                } else {
                    window.addEventListener('firebase-ready', handleFirebaseReady);
                }

                const params = new URLSearchParams(window.location.search);
                const sharedFormId = params.get('formId');
                if (sharedFormId) {
                    setUrlFormId(sharedFormId);
                    setActiveMenu('evaluation');
                }

                const cachedUser = localStorage.getItem('mec_logged_user');
                const cachedRole = localStorage.getItem('mec_user_role');
                if (cachedUser && cachedRole) {
                    setLoggedInUser(JSON.parse(cachedUser));
                    setUserRole(cachedRole);
                }

                return () => window.removeEventListener('firebase-ready', handleFirebaseReady);
            }, []);

            // Realtime Sync Engine for Firebase
            useEffect(() => {
                if (!isFirebaseReady) return;

                const db = window.firebaseDB;
                const { fbCollection, fbOnSnapshot } = window;

                const unsubForms = fbOnSnapshot(fbCollection(db, "forms"), (snapshot) => {
                    const forms = []; snapshot.forEach(doc => forms.push({ id: doc.id, ...doc.data() })); setFormList(forms);
                }, (error) => console.error("Forms Sync failed:", error));

                const unsubStudents = fbOnSnapshot(fbCollection(db, "students"), (snapshot) => {
                    const students = []; snapshot.forEach(doc => students.push({ id: doc.id, ...doc.data() })); setStudentList(students);
                }, (error) => console.error("Students Sync failed:", error));

                const unsubSubjects = fbOnSnapshot(fbCollection(db, "subjects"), (snapshot) => {
                    const subjects = []; snapshot.forEach(doc => subjects.push({ id: doc.id, ...doc.data() })); setSubjectList(subjects);
                }, (error) => console.error("Subjects Sync failed:", error));

                const unsubEvals = fbOnSnapshot(fbCollection(db, "evaluations"), (snapshot) => {
                    const evals = []; snapshot.forEach(doc => evals.push({ id: doc.id, ...doc.data() })); setEvalList(evals);
                }, (error) => console.error("Evaluations Sync failed:", error));

                return () => { unsubForms(); unsubStudents(); unsubSubjects(); unsubEvals(); };
            }, [isFirebaseReady]);

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                setLoginError('');
                const u = loginUsername.trim();
                const p = loginPassword.trim();

                if (!u || !p) {
                    setLoginError('กรุณากรอกข้อมูลให้ครบถ้วน');
                    return;
                }

                if (u === 'ADMIN' && p === 'ADMIN') {
                    const userObj = { username: 'ADMIN', name: 'ผู้ดูแลระบบ (ADMIN)' };
                    setLoggedInUser(userObj); setUserRole('ADMIN'); setActiveMenu('overview');
                    localStorage.setItem('mec_logged_user', JSON.stringify(userObj));
                    localStorage.setItem('mec_user_role', 'ADMIN');
                    return;
                }

                if (u === 'STAFF' && p === 'STAFF') {
                    const userObj = { username: 'STAFF', name: 'อาจารย์แพทย์/เจ้าหน้าที่ (STAFF)' };
                    setLoggedInUser(userObj); setUserRole('STAFF'); setActiveMenu('overview');
                    localStorage.setItem('mec_logged_user', JSON.stringify(userObj));
                    localStorage.setItem('mec_user_role', 'STAFF');
                    return;
                }

                const student = studentList.find(st => String(st.studentId).trim() === u);
                if (student && p === u) {
                    const userObj = { 
                        username: u, 
                        name: `${student.prefix || ''}${student.firstName || ''} ${student.lastName || ''}`,
                        studentProfile: student
                    };
                    setLoggedInUser(userObj); setUserRole('STUDENT'); setActiveMenu('overview');
                    localStorage.setItem('mec_logged_user', JSON.stringify(userObj));
                    localStorage.setItem('mec_user_role', 'STUDENT');
                    return;
                }

                setLoginError('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            };

            const handleLogout = () => {
                setLoggedInUser(null); setUserRole(null);
                localStorage.removeItem('mec_logged_user');
                localStorage.removeItem('mec_user_role');
            };

            // CRUD Firebase Actions
            const handleSaveForm = async (formData) => {
                await window.fbSetDoc(window.fbDoc(window.firebaseDB, "forms", formData.id), formData);
            };
            const handleDeleteForm = async (formId) => {
                await window.fbDeleteDoc(window.fbDoc(window.firebaseDB, "forms", formId));
            };
            const handleSaveSubject = async (subData) => {
                await window.fbSetDoc(window.fbDoc(window.firebaseDB, "subjects", subData.id), subData);
            };
            const handleDeleteSubject = async (subId) => {
                await window.fbDeleteDoc(window.fbDoc(window.firebaseDB, "subjects", subId));
            };
            const handleSaveStudent = async (studentData) => {
                await window.fbSetDoc(window.fbDoc(window.firebaseDB, "students", studentData.id), studentData);
            };
            const handleDeleteStudent = async (studentId) => {
                await window.fbDeleteDoc(window.fbDoc(window.firebaseDB, "students", studentId));
            };
            const handleSaveEval = async (evalData) => {
                await window.fbSetDoc(window.fbDoc(window.firebaseDB, "evaluations", evalData.id), evalData);
            };

            const sidebarItems = useMemo(() => [
                { id: 'overview', icon: <Icons.LayoutDashboard />, label: 'หน้าหลัก (Dashboard)', allowed: ['ADMIN', 'STAFF', 'STUDENT'] },
                { id: 'results', icon: <Icons.TrendingUp />, label: 'คะแนนผลการประเมิน', allowed: ['ADMIN', 'STAFF'] },
                { id: 'evaluation', icon: <Icons.ClipboardCheck />, label: 'ประเมินนักศึกษา (อาจารย์)', allowed: ['ADMIN', 'STAFF'] },
                { id: 'forms', icon: <Icons.Folder />, label: 'คลังแบบประเมิน', allowed: ['ADMIN', 'STUDENT'] },
                { id: 'subjects', icon: <Icons.BookOpen />, label: 'จัดการรายวิชา', allowed: ['ADMIN'] },
                { id: 'students', icon: <Icons.Users />, label: 'นักศึกษาแพทย์', allowed: ['ADMIN'] },
                { id: 'settings', icon: <Icons.Settings />, label: 'ตั้งค่าระบบ', allowed: ['ADMIN'] },
            ].filter(item => item.allowed.includes(userRole)), [userRole]);

            const renderContent = () => {
                switch (activeMenu) {
                    case 'overview':
                        return <DashboardView evalList={evalList} studentList={studentList} subjectList={subjectList} formList={formList} />;
                    case 'results':
                        return <ResultsView evalList={evalList} studentList={studentList} subjectList={subjectList} formList={formList} />;
                    case 'evaluation':
                        return <EvaluationView formList={formList} studentList={studentList} subjectList={subjectList} onSaveEval={handleSaveEval} preselectedFormId={urlFormId} />;
                    case 'forms':
                        return <FormsManager formList={formList} subjectList={subjectList} onSaveForm={handleSaveForm} onDeleteForm={handleDeleteForm} userRole={userRole} />;
                    case 'subjects':
                        return <SubjectsView subjectList={subjectList} onSaveSubject={handleSaveSubject} onDeleteSubject={handleDeleteSubject} />;
                    case 'students':
                        return <StudentsView studentList={studentList} onSaveStudent={handleSaveStudent} onDeleteStudent={handleDeleteStudent} evalList={evalList} formList={formList} />;
                    case 'settings':
                        return <SettingsView />;
                    default:
                        return null;
                }
            };

            const isSharedAccess = !!urlFormId;

            if (!loggedInUser && !isSharedAccess) {
                return (
                    <MacOSWindow title="เข้าสู่ระบบ - MEC Chumphon" userRole={null} onLogout={handleLogout}>
                        <div className="flex-1 flex items-center justify-center p-4 font-sans">
                            <form onSubmit={handleLoginSubmit} className="w-full max-w-sm bg-white p-8 rounded-2xl border border-gray-100 shadow-xl space-y-5">
                                <div className="text-center space-y-1">
                                    <div className="mx-auto w-12 h-12 bg-blue-50 text-mac-blue rounded-xl flex items-center justify-center">
                                        <Icons.Lock width="24" height="24" />
                                    </div>
                                    <h3 className="font-bold text-gray-800 text-base mt-2">MEC Chumphon Login</h3>
                                    <p className="text-xs text-gray-400">ระบบประเมินศูนย์แพทยศาสตรศึกษาชั้นคลินิก</p>
                                </div>
                                {loginError && <div className="p-2.5 bg-red-50 text-red-500 text-xs rounded-lg">{loginError}</div>}
                                <div className="space-y-4 text-xs">
                                    <div>
                                        <label className="block text-gray-500 mb-1 font-semibold">ชื่อผู้ใช้งาน (Username)</label>
                                        <input type="text" value={loginUsername} onChange={e=>setLoginUsername(e.target.value)} placeholder="ADMIN / STAFF / รหัสนักศึกษา" className="w-full p-2.5 border rounded-lg bg-gray-50 outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-gray-500 mb-1 font-semibold">รหัสผ่าน (Password)</label>
                                        <input type="password" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} placeholder="กรอกรหัสผ่าน" className="w-full p-2.5 border rounded-lg bg-gray-50 outline-none" required />
                                    </div>
                                </div>
                                <button type="submit" className="w-full py-2.5 bg-mac-blue text-white rounded-lg text-xs font-bold shadow hover:bg-blue-600 transition">เข้าสู่ระบบ</button>
                            </form>
                        </div>
                    </MacOSWindow>
                );
            }

            return (
                <MacOSWindow title="ระบบบริหารจัดการแบบประเมินนักศึกษาแพทย์" userRole={userRole} onLogout={handleLogout}>
                    {!isSharedAccess && (
                        <div className="w-64 glass-darker border-r border-white/40 flex flex-col pt-4 shrink-0 font-sans">
                            <div className="px-6 mb-6">
                                <h2 className="text-xs font-bold text-gray-500 uppercase tracking-wider">MEC CHUMPHON</h2>
                                <div className="text-xs font-semibold text-gray-700 leading-tight">รพ.ชุมพรเขตรอุดมศักดิ์</div>
                            </div>
                            <div className="flex-1 px-3 space-y-1 overflow-y-auto">
                                {sidebarItems.map(item => (
                                    <button key={item.id} onClick={() => setActiveMenu(item.id)} className={`w-full flex items-center space-x-3 px-3 py-2 rounded-lg text-sm transition ${activeMenu === item.id ? 'bg-mac-blue text-white shadow' : 'text-gray-700 hover:bg-white/50'}`}>
                                        {item.icon}<span>{item.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                    {renderContent()}
                </MacOSWindow>
            );
        };

        const MacOSWindow = ({ children, title, userRole, onLogout }) => (
            <div className="w-full h-full glass rounded-none md:rounded-2xl md:shadow-2xl flex flex-col overflow-hidden border-0 md:border border-white/40 relative font-sans">
                <div className="h-12 w-full flex items-center justify-between px-4 glass-darker border-b border-white/40 shrink-0">
                    <div className="flex space-x-2">
                        <div className="w-3 h-3 rounded-full bg-red-400 border border-red-500 shadow-sm"></div>
                        <div className="w-3 h-3 rounded-full bg-yellow-400 border border-yellow-500 shadow-sm"></div>
                        <div className="w-3 h-3 rounded-full bg-green-400 border border-green-500 shadow-sm"></div>
                    </div>
                    <div className="text-sm font-semibold text-gray-700">{title}</div>
                    <div>{userRole && <button onClick={onLogout} className="p-1 hover:bg-red-50 hover:text-red-500 rounded transition"><Icons.LogOut/></button>}</div>
                </div>
                <div className="flex-1 flex overflow-hidden">{children}</div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
