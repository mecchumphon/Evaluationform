    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD80foym7eOp6tszPAbxrBPxSCF3GOao_g",
            authDomain: "eval-meccph.firebaseapp.com",
            projectId: "eval-meccph",
            storageBucket: "eval-meccph.firebasestorage.app",
            messagingSenderId: "826066180546",
            appId: "1:826066180546:web:0f11ac2187c7bc35f41e5b",
            measurementId: "G-WNJ8RD0VM1"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const storage = getStorage(app);

            window.firebaseDB = db;
            window.fbCollection = collection;
            window.fbOnSnapshot = onSnapshot;
            window.fbDoc = doc;
            window.fbSetDoc = setDoc;
            window.fbDeleteDoc = deleteDoc;
            window.firebaseStorage = storage;
            window.fbRef = ref;
            window.fbUploadBytes = uploadBytes;
            window.fbGetDownloadURL = getDownloadURL;

            window.dispatchEvent(new Event('firebase-ready'));
        } catch (error) {
            console.error("Firebase initialization failed:", error);
        }
    </script>

    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        @media (max-width: 768px) {
            body { padding: 0; height: 100%; min-height: 100vh; align-items: flex-start; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .glass-darker {
            background: rgba(240, 240, 240, 0.7);
            backdrop-filter: blur(25px);
        }

</head>
<body>

            LogOut: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,

            TrendingUp: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>,
            FileSpreadsheet: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h2"></path><path d="M8 17h2"></path><path d="M14 13h2"></path><path d="M14 17h2"></path></svg>,
            FilePdf: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>,
            Search: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            Link: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>,
            Plus: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,

            Trash: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Activity: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>,

            Camera: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Clock: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            PenTool: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>,
        };

        // --- Component: DashboardView ---
        const DashboardView = ({ evalList, studentList, subjectList, formList }) => {
            const stats = useMemo(() => {
                return {
                    totalEvaluations: evalList.length,
                    totalStudents: studentList.length,
                    totalSubjects: subjectList.length,
                    totalForms: formList.length,
                };
            }, [evalList, studentList, subjectList, formList]);

            return (
                <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 bg-white/40">
                    <div className="max-w-5xl mx-auto space-y-6">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800">ระบบบริหารจัดการแบบประเมินนักศึกษาแพทย์</h1>
                            <p className="text-sm text-gray-500">ศูนย์แพทยศาสตรศึกษาชั้นคลินิก โรงพยาบาลชุมพรเขตรอุดมศักดิ์</p>
                        </div>

                        {/* Stats Grid */}
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                            {[
                                { title: "การประเมินทั้งหมด", val: stats.totalEvaluations, desc: "ใบประเมินที่ส่งแล้ว" },
                                { title: "นักศึกษาแพทย์", val: stats.totalStudents, desc: "คนในระบบ" },
                                { title: "รายวิชาชั้นคลินิก", val: stats.totalSubjects, desc: "รายวิชาทั้งหมด" },
                                { title: "แบบฟอร์มคลัง", val: stats.totalForms, desc: "ประเภทแบบประเมิน" }
                            ].map((s, idx) => (
                                <div key={idx} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                                    <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider">{s.title}</div>
                                    <div className="my-2">
                                        <span className="text-2xl md:text-3xl font-bold text-gray-800">{s.val}</span>
                                    </div>
                                    <div className="text-[11px] text-gray-500">{s.desc}</div>
                                </div>
                            ))}
                        </div>

                        {/* Recent Evaluations and Top Students side by side */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 lg:col-span-2">
                                <h3 className="text-sm font-bold text-gray-700 mb-4 flex items-center">
                                    <Icons.Activity className="mr-2 text-mac-blue" />
                                    การประเมินล่าสุด
                                </h3>
                                {evalList.length === 0 ? (
                                    <div className="text-center py-8 text-gray-400 text-xs">ยังไม่มีประวัติการประเมิน</div>
                                ) : (
                                    <div className="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                                        {evalList.slice().reverse().slice(0, 5).map((ev) => {
                                            const student = studentList.find(s => s.id === ev.studentId);
                                            const form = formList.find(f => f.id === ev.formId);
                                            return (
                                                <div key={ev.id} className="p-3 bg-gray-50 rounded-lg flex items-center justify-between text-xs border border-gray-100">
                                                    <div className="flex items-center space-x-3">
                                                        {student && student.avatar ? (
                                                            <img src={student.avatar} alt="Avatar" className="w-10 h-10 rounded-lg object-cover border" />
                                                        ) : (
                                                            <div className="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center font-bold text-mac-blue">
                                                                {student ? (student.firstName || 'N').charAt(0) : 'N'}
                                                            </div>
                                                        )}
                                                        <div>
                                                            <div className="font-semibold text-gray-800">
                                                                {student ? `${student.prefix || ''}${student.firstName || ''} ${student.lastName || ''}` : "ไม่พบนศ."}
                                                            </div>
                                                            <div className="text-[11px] text-gray-500 mt-0.5 flex items-center space-x-2">
                                                                <span>{form?.title || "ไม่พบฟอร์ม"}</span>
                                                                {student && student.academicYear && (
                                                                    <span className="px-1 py-0.2 bg-gray-200 text-gray-600 rounded text-[9px]">ปีการศึกษา {student.academicYear}</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="font-bold text-mac-blue">
                                                            {ev.scores?.totalScore ?? 0} / {form?.totalScore ?? 100} คะแนน
                                                        </div>
                                                        <div className="text-[10px] text-gray-400 mt-0.5">{ev.createdAt || ""}</div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                                <h3 className="text-sm font-bold text-gray-700 mb-4 flex items-center">
                                    <Icons.Clock className="mr-2 text-emerald-500" />
                                    วิชาที่มีการประเมินบ่อย
                                </h3>
                                <div className="space-y-3">
                                    {subjectList.slice(0, 4).map((sub, i) => {
                                        const count = evalList.filter(ev => {
                                            const form = formList.find(f => f.id === ev.formId);
                                            return form && form.subjectId === sub.id;
                                        }).length;
                                        return (
                                            <div key={sub.id} className="flex items-center justify-between text-xs pb-2 border-b last:border-b-0">
                                                <span className="font-medium text-gray-700 truncate max-w-[150px]">{sub.code} {sub.name}</span>
                                                <span className="px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full font-bold">{count} ครั้ง</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Component: ResultsView ---
        const ResultsView = ({ evalList, studentList, subjectList, formList }) => {
            const [viewMode, setViewMode] = useState('overview'); // 'overview' or 'individual'
            const [searchTerm, setSearchTerm] = useState('');
            const [filterSubject, setFilterSubject] = useState('all');
            const [selectedStudentId, setSelectedStudentId] = useState('');

            // Data Transformation: Join Evaluations with Student, Subject, and Form info
            const enrichedEvals = useMemo(() => {
                return evalList.map(ev => {
                    const student = studentList.find(s => s.id === ev.studentId) || {};
                    const form = formList.find(f => f.id === ev.formId) || {};
                    const subject = subjectList.find(s => s.id === form.subjectId) || {};
                    return {
                        ...ev,
                        studentName: `${student.prefix || ''}${student.firstName || ''} ${student.lastName || ''}`,
                        studentCode: student.studentId || '-',
                        academicYear: student.academicYear || '-',
                        classYear: student.year || '-',
                        subjectName: subject.name || '-',
                        subjectCode: subject.code || '-',
                        formTitle: form.title || '-',
                        maxScore: form.totalScore || 0,
                        rawScore: ev.scores?.totalScore || 0
                    };
                }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }, [evalList, studentList, subjectList, formList]);

            const filteredResults = useMemo(() => {
                return enrichedEvals.filter(ev => {
                    const matchSearch = ev.studentName.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                      ev.studentCode.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchSubject = filterSubject === 'all' || ev.subjectId === filterSubject;
                    const matchStudent = viewMode === 'overview' || ev.studentId === selectedStudentId;
                    return matchSearch && matchSubject && matchStudent;
                });
            }, [enrichedEvals, searchTerm, filterSubject, selectedStudentId, viewMode]);

            // Export Excel
            const exportToExcel = () => {
                const data = filteredResults.map(ev => ({
                    "วันที่": ev.createdAt,
                    "รหัสนักศึกษา": ev.studentCode,
                    "ชื่อ-นามสกุล": ev.studentName,
                    "ปีการศึกษา": ev.academicYear,
                    "ชั้นปี": ev.classYear,
                    "รหัสวิชา": ev.subjectCode,
                    "ชื่อวิชา": ev.subjectName,
                    "แบบประเมิน": ev.formTitle,
                    "คะแนนที่ได้": ev.rawScore,
                    "คะแนนเต็ม": ev.maxScore,
                    "อาจารย์ผู้ประเมิน": ev.evaluatorName,
                    "ความคิดเห็น": ev.comments || ""
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Evaluation Scores");
                XLSX.writeFile(wb, `MEC_Scores_${viewMode}_${new Date().getTime()}.xlsx`);
            };

            // Export PDF
            const exportToPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4');
                const title = viewMode === 'overview' ? "รายงานคะแนนผลการประเมินภาพรวม" : `รายงานคะแนนนักศึกษา: ${filteredResults[0]?.studentName || ""}`;
                
                doc.text(title, 14, 15);
                
                const tableData = filteredResults.map(ev => [
                    ev.createdAt,
                    ev.studentCode,
                    ev.studentName,
                    ev.subjectCode,
                    ev.formTitle,
                    `${ev.rawScore}/${ev.maxScore}`,
                    ev.evaluatorName
                ]);

                doc.autoTable({
                    startY: 20,
                    head: [['วันที่', 'รหัส นศ.', 'ชื่อ-นามสกุล', 'วิชา', 'แบบประเมิน', 'คะแนน', 'ผู้ประเมิน']],
                    body: tableData,
                    styles: { font: 'Sarabun', fontSize: 8 },
                });

                doc.save(`MEC_Report_${new Date().getTime()}.pdf`);
            };

            return (
                <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-white/40 space-y-6">
                    <div className="max-w-6xl mx-auto space-y-6">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">คะแนนผลการประเมิน</h2>
                                <p className="text-sm text-gray-500">ติดตามและส่งออกผลการประเมินนักศึกษาแพทย์</p>
                            </div>
                            <div className="flex items-center space-x-2">
                                <button onClick={exportToExcel} className="flex items-center px-3 py-2 bg-emerald-600 text-white rounded-lg text-xs font-semibold hover:bg-emerald-700 transition shadow-sm">
                                    <Icons.FileSpreadsheet className="mr-1.5" /> Excel
                                </button>
                                <button onClick={exportToPDF} className="flex items-center px-3 py-2 bg-red-600 text-white rounded-lg text-xs font-semibold hover:bg-red-700 transition shadow-sm">
                                    <Icons.FilePdf className="mr-1.5" /> PDF
                                </button>
                            </div>
                        </div>

                        {/* Tabs & Filters */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border space-y-4">
                            <div className="flex bg-gray-100 p-1 rounded-lg w-fit">
                                <button 
                                    onClick={() => setViewMode('overview')}
                                    className={`px-4 py-1.5 text-xs font-bold rounded-md transition ${viewMode === 'overview' ? 'bg-white shadow text-mac-blue' : 'text-gray-500'}`}
                                >
                                    ภาพรวม (Overview)
                                </button>
                                <button 
                                    onClick={() => setViewMode('individual')}
                                    className={`px-4 py-1.5 text-xs font-bold rounded-md transition ${viewMode === 'individual' ? 'bg-white shadow text-mac-blue' : 'text-gray-500'}`}
                                >
                                    รายบุคคล (Individual)
                                </button>
                            </div>

                            <div className="flex flex-wrap gap-3 items-end">
                                <div className="flex-1 min-w-[200px]">
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">ค้นหานักศึกษา</label>
                                    <div className="relative">
                                        <Icons.Search className="absolute left-3 top-2.5 text-gray-400" />
                                        <input 
                                            type="text" 
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            placeholder="ชื่อ หรือ รหัสประจำตัว..."
                                            className="w-full pl-9 pr-3 py-2 bg-gray-50 border rounded-lg text-xs outline-none focus:ring-2 focus:ring-mac-blue/20"
                                        />
                                    </div>
                                </div>
                                <div className="w-full md:w-48">
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">กรองรายวิชา</label>
                                    <select 
                                        value={filterSubject}
                                        onChange={(e) => setFilterSubject(e.target.value)}
                                        className="w-full p-2 bg-gray-50 border rounded-lg text-xs outline-none"
                                    >
                                        <option value="all">ทุกรายวิชา</option>
                                        {subjectList.map(s => <option key={s.id} value={s.id}>{s.code} {s.name}</option>)}
                                    </select>
                                </div>
                                {viewMode === 'individual' && (
                                    <div className="w-full md:w-64">
                                        <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">เลือกนักศึกษา</label>
                                        <select 
                                            value={selectedStudentId}
                                            onChange={(e) => setSelectedStudentId(e.target.value)}
                                            className="w-full p-2 bg-gray-50 border rounded-lg text-xs outline-none"
                                        >
                                            <option value="">-- เลือกนักศึกษา --</option>
                                            {studentList.map(s => <option key={s.id} value={s.id}>{s.prefix}{s.firstName} {s.lastName}</option>)}
                                        </select>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Results Table */}
                        <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-gray-50 border-b text-[10px] font-bold text-gray-500 uppercase tracking-wider">
                                            <th className="p-4">วันที่ประเมิน</th>
                                            <th className="p-4">นักศึกษา</th>
                                            <th className="p-4">วิชา/แบบประเมิน</th>
                                            <th className="p-4 text-center">คะแนน</th>
                                            <th className="p-4">ผู้ประเมิน</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y text-xs text-gray-700">
                                        {filteredResults.map(res => (
                                            <tr key={res.id} className="hover:bg-gray-50 transition-colors">
                                                <td className="p-4 font-mono text-gray-400 whitespace-nowrap">{res.createdAt}</td>
                                                <td className="p-4">
                                                    <div className="font-bold text-gray-800">{res.studentName}</div>
                                                    <div className="text-[10px] text-gray-400">ID: {res.studentCode} | ปีการศึกษา {res.academicYear}</div>
                                                </td>
                                                <td className="p-4">
                                                    <div className="font-semibold text-mac-blue">{res.subjectCode} {res.subjectName}</div>
                                                    <div className="text-[10px] text-gray-400 truncate max-w-[200px]">{res.formTitle}</div>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <span className={`px-2.5 py-1 rounded-full font-bold ${
                                                        (res.rawScore / res.maxScore) >= 0.8 ? 'bg-green-100 text-green-700' :
                                                        (res.rawScore / res.maxScore) >= 0.5 ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'
                                                    }`}>
                                                        {res.rawScore} / {res.maxScore}
                                                    </span>
                                                </td>
                                                <td className="p-4">
                                                    <div className="font-medium">{res.evaluatorName}</div>
                                                </td>
                                            </tr>
                                        ))}
                                        {filteredResults.length === 0 && (
                                            <tr>
                                                <td colSpan="5" className="p-12 text-center text-gray-400 italic">ไม่พบข้อมูลคะแนนประเมินที่ตรงกับเงื่อนไข</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Component: EvaluationView ---
        const EvaluationView = ({ formList, studentList, subjectList, onSaveEval, preselectedFormId }) => {
            const [selectedSubject, setSelectedSubject] = useState('');
            const [selectedForm, setSelectedForm] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState('');
            const [evalScores, setEvalScores] = useState({});
            const [evalComments, setEvalComments] = useState('');
            const [evaluatorName, setEvaluatorName] = useState('');
            const [evalDate, setEvalDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedAcademicYear, setSelectedAcademicYear] = useState('all');

            // Handle pre-selected form link
            useEffect(() => {
                if (preselectedFormId && formList.length > 0) {
                    const matchedForm = formList.find(f => f.id === preselectedFormId);
                    if (matchedForm) {
                        setSelectedSubject(matchedForm.subjectId);
                        handleFormSelect(matchedForm.id);
                    }
                }
            }, [preselectedFormId, formList]);

            // Filter forms by selected subject
            const filteredForms = useMemo(() => {
                if (!selectedSubject) return [];
                return formList.filter(f => f.subjectId === selectedSubject);
            }, [selectedSubject, formList]);

            const handleFormSelect = (formId) => {
                const form = formList.find(f => f.id === formId);
                setSelectedForm(form);
                if (form) {
                    const initialScores = {};
                    form.criteria.forEach(c => {
                        initialScores[c.id] = c.options[0]?.score || 0;
                    });
                    setEvalScores(initialScores);
                } else {
                    setEvalScores({});
                }
            };

            const handleScoreChange = (cId, scoreVal) => {
                setEvalScores(prev => ({
                    ...prev,
                    [cId]: Number(scoreVal)
                }));
            };

            const calculatedTotal = useMemo(() => {
                return Object.values(evalScores).reduce((sum, val) => sum + val, 0);
            }, [evalScores]);

            const uniqueAcademicYears = useMemo(() => {
                const years = studentList.map(st => st.academicYear).filter(Boolean);
                return [...new Set(years)].sort((a, b) => b - a);
            }, [studentList]);

            const filteredStudentsByYear = useMemo(() => {
                if (!selectedForm) return [];
                return studentList.filter(st => {
                    const matchClassYear = Number(st.year) === Number(selectedForm.year);
                    const matchAcademicYear = selectedAcademicYear === 'all' || String(st.academicYear) === String(selectedAcademicYear);
                    return matchClassYear && matchAcademicYear;
                });
            }, [selectedForm, studentList, selectedAcademicYear]);

            const handleFormSubmit = (e) => {
                e.preventDefault();
                if (!selectedStudent || !selectedForm || !evaluatorName) {
                    alert("กรุณากรอกข้อมูลนักศึกษา, เลือกแบบประเมิน และชื่อผู้ประเมินให้ครบถ้วน");
                    return;
                }

                const payload = {
                    id: `eval_${Date.now()}`,
                    studentId: selectedStudent,
                    formId: selectedForm.id,
                    evaluatorName: evaluatorName,
                    comments: evalComments,
                    scores: {
                        criteriaScores: evalScores,
                        totalScore: calculatedTotal
                    },
                    createdAt: evalDate
                };

                onSaveEval(payload);

                // Reset state
                setSelectedForm(null);
                setSelectedStudent('');
                setEvalScores({});
                setEvalComments('');
                alert("🎉 บันทึกผลการประเมินนักศึกษาสำเร็จเรียบร้อยแล้ว!");
            };

            return (
                <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-white/40">
                    <div className="max-w-4xl mx-auto space-y-6">
                        <div>
                            <h2 className="text-xl font-bold text-gray-800">ระบบประเมินนักศึกษาแพทย์</h2>
                            <p className="text-sm text-gray-500">สำหรับอาจารย์แพทย์กรอกคะแนนการเรียนรู้และการฝึกปฏิบัติทางคลินิก</p>
                        </div>

                        {!selectedForm ? (
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                                <h3 className="text-sm font-semibold text-gray-700">เลือกแบบประเมินที่ต้องการบันทึก</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-medium text-gray-500 mb-1">เลือกวิชาชั้นคลินิก</label>
                                        <select 
                                            value={selectedSubject} 
                                            onChange={(e) => { setSelectedSubject(e.target.value); setSelectedForm(null); }}
                                            className="w-full text-xs p-2.5 border rounded-lg bg-gray-50"
                                        >
                                            <option value="">-- เลือกวิชา --</option>
                                            {subjectList.map(s => (
                                                <option key={s.id} value={s.id}>{s.code} - {s.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium text-gray-500 mb-1">เลือกแบบประเมิน</label>
                                        <select 
                                            disabled={!selectedSubject}
                                            onChange={(e) => handleFormSelect(e.target.value)}
                                            className="w-full text-xs p-2.5 border rounded-lg bg-gray-50 disabled:opacity-50"
                                        >
                                            <option value="">-- เลือกฟอร์มประเมิน --</option>
                                            {filteredForms.map(f => (
                                                <option key={f.id} value={f.id}>{f.title} (นศพ.ปี {f.year})</option>
                                            ))}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <form onSubmit={handleFormSubmit} className="space-y-6">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                                    <div className="flex justify-between items-center pb-2 border-b">
                                        <h3 className="font-bold text-gray-800 text-sm md:text-base">{selectedForm.title}</h3>
                                        <button 
                                            type="button" 
                                            onClick={() => { setSelectedForm(null); setSelectedStudent(''); }}
                                            className="text-xs text-red-500 hover:underline"
                                        >
                                            ยกเลิกฟอร์มนี้
                                        </button>
                                    </div>

                                    {/* Evaluation Demographics */}
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                        <div>
                                            <label className="block text-xs font-medium text-gray-500 mb-1">ปีการศึกษาที่ลงทะเบียน</label>
                                            <select 
                                                value={selectedAcademicYear}
                                                onChange={(e) => { setSelectedAcademicYear(e.target.value); setSelectedStudent(''); }}
                                                className="w-full text-xs p-2 border rounded bg-gray-50"
                                            >
                                                <option value="all">ทั้งหมด</option>
                                                {uniqueAcademicYears.map(yr => (
                                                    <option key={yr} value={yr}>ปีการศึกษา {yr}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-gray-500 mb-1">นักศึกษาแพทย์ (ชั้นปี {selectedForm.year}) <span className="text-red-500">*</span></label>
                                            <select 
                                                required
                                                value={selectedStudent}
                                                onChange={(e) => setSelectedStudent(e.target.value)}
                                                className="w-full text-xs p-2 border rounded bg-gray-50"
                                            >
                                                <option value="">-- เลือกนักศึกษา --</option>
                                                {filteredStudentsByYear.map(st => (
                                                    <option key={st.id} value={st.id}>
                                                        {st.prefix || ''}{st.firstName || ''} {st.lastName || ''} (ปีศึกษา {st.academicYear || 'ไม่ระบุ'})
                                                    </option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-gray-500 mb-1">อาจารย์ผู้ประเมิน <span className="text-red-500">*</span></label>
                                            <input 
                                                type="text" 
                                                required
                                                placeholder="ชื่อ-สกุล อาจารย์แพทย์"
                                                value={evaluatorName}
                                                onChange={(e) => setEvaluatorName(e.target.value)}
                                                className="w-full text-xs p-2 border rounded bg-gray-50"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-gray-500 mb-1">วันที่ทำการประเมิน</label>
                                            <input 
                                                type="date"
                                                value={evalDate}
                                                onChange={(e) => setEvalDate(e.target.value)}
                                                className="w-full text-xs p-2 border rounded bg-gray-50"
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* Criteria Checklist Score Input */}
                                <div className="space-y-4">
                                    {selectedForm.criteria.map((c, cIdx) => {
                                        const scoresArray = c.options.map(o => Number(o.score) || 0);
                                        const maxScore = scoresArray.length > 0 ? Math.max(...scoresArray) : 10;
                                        const minScore = scoresArray.length > 0 ? Math.min(...scoresArray) : 0;
                                        const isContinuousScale = c.options.length > 3 || maxScore > 5;

                                        return (
                                            <div key={c.id} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4">
                                                <div className="flex justify-between items-start">
                                                    <h4 className="text-sm font-semibold text-gray-800 max-w-[80%]">
                                                        {cIdx + 1}. {c.topic}
                                                    </h4>
                                                    <span className="px-2 py-0.5 bg-blue-50 text-mac-blue font-mono font-bold text-xs rounded">
                                                        คะแนนปัจจุบัน: {evalScores[c.id] ?? minScore} / {maxScore}
                                                    </span>
                                                </div>
                                                
                                                {isContinuousScale ? (
                                                    <div className="space-y-6 py-2">
                                                        {/* Slider Input */}
                                                        <div className="relative px-2">
                                                            <input 
                                                                type="range" 
                                                                min={minScore} 
                                                                max={maxScore} 
                                                                step="1"
                                                                value={evalScores[c.id] ?? minScore}
                                                                onChange={(e) => handleScoreChange(c.id, e.target.value)}
                                                                className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-mac-blue"
                                                            />
                                                            
                                                            {/* Scale Ticks & Labels */}
                                                            <div className="flex justify-between text-[10px] text-gray-400 font-mono mt-1 px-1">
                                                                {Array.from({ length: maxScore - minScore + 1 }).map((_, idx) => {
                                                                    const currentVal = minScore + idx;
                                                                    const shouldShowLabel = maxScore <= 10 ? true : (currentVal % 2 === 0);
                                                                    return (
                                                                        <span key={idx} className="flex flex-col items-center">
                                                                            <span className="h-1 w-0.5 bg-gray-300"></span>
                                                                            {shouldShowLabel && <span className="mt-0.5 font-bold">{currentVal}</span>}
                                                                        </span>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>

                                                        {/* Rubric Descriptions mapping current slider score */}
                                                        <div className="bg-gray-50 p-3 rounded-lg border border-gray-100 space-y-1">
                                                            <span className="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">คำอธิบายเกณฑ์วิชาการ:</span>
                                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">
                                                                {c.options.map((opt, oIdx) => {
                                                                    const isSelectedRange = (evalScores[c.id] ?? minScore) >= Number(opt.score);
                                                                    return (
                                                                        <div 
                                                                            key={oIdx} 
                                                                            className={`p-2 rounded text-[11px] leading-tight transition-all ${
                                                                                isSelectedRange 
                                                                                ? 'bg-white border border-mac-blue text-gray-800 font-medium shadow-sm' 
                                                                                : 'text-gray-400 opacity-60'
                                                                            }`}
                                                                        >
                                                                            <div className="font-bold font-mono">≥ {opt.score} คะแนน</div>
                                                                            <div className="text-[10px]">{opt.label || '-'}</div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                                                        {c.options.map((opt, oIdx) => (
                                                            <label 
                                                                key={oIdx} 
                                                                className={`p-3 border rounded-lg cursor-pointer flex flex-col justify-between transition-colors ${
                                                                    evalScores[c.id] === Number(opt.score)
                                                                    ? 'border-mac-blue bg-blue-50/50' 
                                                                    : 'border-gray-200 hover:bg-gray-50'
                                                                }`}
                                                            >
                                                                <div className="flex items-center justify-between mb-1">
                                                                    <span className="text-xs font-bold text-gray-700">{opt.score} คะแนน</span>
                                                                    <input 
                                                                        type="radio" 
                                                                        name={`c_${c.id}`}
                                                                        value={opt.score}
                                                                        checked={evalScores[c.id] === Number(opt.score)}
                                                                        onChange={() => handleScoreChange(c.id, opt.score)}
                                                                        className="text-mac-blue focus:ring-mac-blue"
                                                                    />
                                                                </div>
                                                                <p className="text-[11px] text-gray-500 leading-tight">
                                                                    {opt.label || "- ไม่มีคำอธิบาย -"}
                                                                </p>
                                                            </label>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* Comments and Form Summary Submission */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                                    <div>
                                        <label className="block text-xs font-medium text-gray-600 mb-1">ความคิดเห็นเพิ่มเติม / Feedback แก่นักศึกษา</label>
                                        <textarea 
                                            value={evalComments}
                                            onChange={(e) => setEvalComments(e.target.value)}
                                            rows="3" 
                                            className="w-full text-xs p-3 border rounded-lg bg-gray-50"
                                            placeholder="กรอกข้อเสนอแนะเพื่อการพัฒนานักศึกษา..."
                                        />
                                    </div>
                                    <div className="flex items-center justify-between pt-4 border-t">
                                        <div className="text-sm">
                                            คะแนนประเมินรวม: <span className="text-lg font-bold text-mac-blue">{calculatedTotal}</span> / {selectedForm.totalScore} คะแนน
                                        </div>
                                        <button 
                                            type="submit"
                                            className="px-6 py-2 bg-mac-blue text-white rounded-lg text-sm font-semibold shadow hover:bg-blue-600 transition"
                                        >
                                            บันทึกผลการประเมิน
                                        </button>
                                    </div>
                                </div>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        // --- Component: FormsManager ---
        const FormsManager = ({ formList, subjectList, onSaveForm, onDeleteForm, userRole }) => {
            const [editingForm, setEditingForm] = useState(null);
            const [isCreating, setIsCreating] = useState(false);

            const handleShareLink = (form) => {
                const shareUrl = `https://mecchumphon.github.io/Evaluationform/?formId=${form.id}`;
                const subject = subjectList.find(s => s.id === form.subjectId);
                const subjectStr = subject ? `${subject.code} ${subject.name}` : '-';

                const invitationText = `📋 ขอเชิญอาจารย์ประเมินนักศึกษา\nเรื่อง: ${form.title}\nสำหรับ: นักศึกษาแพทย์ชั้นปีที่ ${form.year}\nรายวิชา: (${subjectStr})\n\n👉 คลิกลิงก์ด้านล่างเพื่อเข้าสู่หน้าประเมิน:\n${shareUrl}`;
                
                const textarea = document.createElement('textarea');
                textarea.value = invitationText;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    alert(`🔗 ลิงก์สำหรับเข้าประเมินและข้อความเชิญชวนถูกคัดลอกลงใน Clipboard แล้ว!\nท่านสามารถส่งต่อให้คุณอาจารย์ผ่านช่องทาง Line หรือ Email ได้ทันทีครับ`);
                } catch (err) {
                    console.error("Failed to copy share link: ", err);
                }
                document.body.removeChild(textarea);
            };

            const canEdit = userRole === 'ADMIN';

            if (isCreating || editingForm) {
                return (
                    <FormEditor 
                        form={editingForm} 
                        subjects={subjectList}
                        onSave={(saved) => {
                            onSaveForm(saved);
                            setIsCreating(false);
                            setEditingForm(null);
                        }}
                        onCancel={() => {
                            setIsCreating(false);
                            setEditingForm(null);
                        }}
                    />
                );
            }

            return (
                <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-white/40">
                    <div className="max-w-5xl mx-auto space-y-6">
                        <div className="flex items-center justify-between">
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">คลังแบบประเมิน</h2>
                                <p className="text-sm text-gray-500">สร้างแบบฟอร์ม ส่งต่อลิงก์ให้อาจารย์ หรือปรับปรุงเกณฑ์ประเมินมาตรฐานแกน</p>
                            </div>
                            {canEdit && (
                                <button 
                                    onClick={() => setIsCreating(true)}
                                    className="flex items-center px-4 py-2 bg-mac-blue text-white rounded-lg text-xs font-semibold shadow hover:bg-blue-600 transition"
                                >
                                    <Icons.Plus className="mr-1.5" />
                                    สร้างฟอร์มใหม่
                                </button>
                            )}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {formList.map(form => {
                                const subject = subjectList.find(s => s.id === form.subjectId);
                                return (
                                    <div key={form.id} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition font-sans">
                                        <div>
                                            <div className="flex items-center justify-between mb-2">
                                                <span className="px-2 py-0.5 bg-blue-50 text-mac-blue text-[10px] font-bold rounded">
                                                    ชั้นปี {form.year}
                                                </span>
                                                <span className="text-[10px] text-gray-400">
                                                    ปรับปรุง: {form.updatedAt}
                                                </span>
                                            </div>
                                            <h3 className="text-sm font-bold text-gray-800 line-clamp-1 mb-1">{form.title}</h3>
                                            <p className="text-xs text-gray-500 mb-4">
                                                วิชา: {subject ? `${subject.code} ${subject.name}` : "ไม่ระบุวิชา"}
                                            </p>
                                            <div className="bg-gray-50 p-2 rounded-lg text-xs flex justify-between text-gray-600">
                                                <span>คะแนนรวม: <strong>{form.totalScore}</strong></span>
                                                <span>ค่าน้ำหนัก: <strong>{form.weightPercent}%</strong></span>
                                            </div>
                                        </div>
                                        <div className="mt-5 pt-3 border-t flex justify-between items-center">
                                            {/* Share Button for Professors */}
                                            <button 
                                                onClick={() => handleShareLink(form)}
                                                className="flex items-center text-xs font-semibold text-mac-blue hover:text-blue-700 transition space-x-1"
                                                title="ส่งต่อเกณฑ์เพื่อประเมิน"
                                            >
                                                <Icons.Link width="14" height="14" />
                                                <span>คัดลอกลิงก์แชร์</span>
                                            </button>
                                            
                                            {canEdit && (
                                                <div className="flex space-x-2">
                                                    <button 
                                                        onClick={() => setEditingForm(form)}
                                                        className="p-1.5 hover:bg-gray-100 rounded text-gray-500 hover:text-gray-800 transition"
                                                        title="แก้ไขเกณฑ์"
                                                    >
                                                        <Icons.Edit width="16" height="16" />
                                                    </button>
                                                    <button 
                                                        onClick={() => {
                                                            if(confirm(`ต้องการลบแบบประเมิน "${form.title}" ใช่หรือไม่?`)) {
                                                                onDeleteForm(form.id);
                                                            }
                                                        }}
                                                        className="p-1.5 hover:bg-red-50 rounded text-gray-400 hover:text-red-500 transition"
                                                        title="ลบ"
                                                    >
                                                        <Icons.Trash width="16" height="16" />
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                            {formList.length === 0 && (
                                <div className="col-span-full text-center py-12 text-gray-400 text-xs bg-white/40 rounded-xl border border-dashed">
                                    ยังไม่มีเกณฑ์แบบประเมินในระบบ
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Component: FormEditor ---
        const FormEditor = ({ form, subjects, onSave, onCancel }) => {
            const [formData, setFormData] = useState(form || {
                id: `form_${Date.now()}`,
                type: 'manual', // 'manual' or 'ai'
                title: '',
                subjectId: '',
                year: 4,
                courseCode: '',
                totalScore: 100,
                weightPercent: 100,
                criteria: []
            });

            const [aiImage, setAiImage] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);

            const handleChange = (e) => {
                const { name, value, type } = e.target;
                setFormData({
                    ...formData,
                    [name]: type === 'number' ? Number(value) : value
                });
            };

            const handleAiImageUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const compressed = await resizeImage(file);
                    setAiImage(compressed);
                }
            };

            const processAI = async () => {
                if (!aiImage) return;

                setIsAnalyzing(true);
                try {
                    const base64Data = aiImage.split(',')[1];
                    const mimeType = aiImage.split(';')[0].split(':')[1];

                    const prompt = `คุณคือผู้ช่วยคณาจารย์แพทย์ หน้าที่ของคุณคืออ่านตารางแบบประเมินนี้ และแปลงให้เป็นข้อมูล JSON อย่างเคร่งครัด
                    
                    สิ่งที่ต้องหา:
                    1. 'หัวข้อการประเมิน' (topic) เช่น ซักประวัติ, ตรวจร่างกาย
                    2. 'เกณฑ์การให้คะแนน' (options) โดยมี 'คะแนน' (score - ต้องเป็นตัวเลข) และ 'คำอธิบาย' (label)
                    
                    ข้อกำหนด:
                    - ตอบกลับมาเป็น JSON Array เท่านั้น ห้ามพิมพ์ข้อความอธิบายใดๆ นอกกรอบ JSON
                    - รูปแบบผลลัพธ์ที่ต้องการ (อย่าลืม [] ครอบทั้งหมด):
                    [
                        {
                            "topic": "ชื่อหัวข้อ",
                            "options": [
                                { "score": 5, "label": "คำอธิบายเกณฑ์ที่ดีมาก" },
                                { "score": 0, "label": "คำอธิบายเกณฑ์ที่ต้องปรับปรุง" }
                            ]
                        }
                    ]`;

                    const apiKey = ""; // Embedded API key handled by platform
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                role: "user",
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: mimeType, data: base64Data } }
                                ]
                            }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || 'API Error');
                    }

                    const result = await response.json();
                    const text = result.candidates[0].content.parts[0].text;
                    const cleanJsonStr = text.replace(/```json/g, '').replace(/```/g, '').trim();
                    let aiData = JSON.parse(cleanJsonStr);

                    aiData = aiData.map(c => ({
                        ...c,
                        id: `c_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`
                    }));

                    setFormData({ ...formData, criteria: aiData, type: 'manual' });
                    setAiImage(null);
                    alert("✨ AI วิเคราะห์ข้อมูลสำเร็จ!\nระบบได้นำข้อมูลมาใส่ในฟอร์มแล้ว กรุณาตรวจสอบและแก้ไขได้ตามต้องการครับ");

                } catch (error) {
                    console.error("AI Analysis Failed:", error);
                    alert(`เกิดข้อผิดพลาดในการวิเคราะห์ด้วย AI: ${error.message}\nโปรดตรวจสอบภาพถ่ายอีกครั้ง`);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                let finalData = { ...formData, updatedAt: new Date().toISOString().split('T')[0] };
                if (finalData.type === 'ai') finalData.type = 'manual'; 
                onSave(finalData);
            };

            const addCriterion = () => setFormData({ ...formData, criteria: [...formData.criteria, { id: `c_${Date.now()}`, topic: '', options: [{ score: 0, label: '' }] }] });
            const updateCriterion = (index, field, value) => { const newCriteria = [...formData.criteria]; newCriteria[index][field] = value; setFormData({ ...formData, criteria: newCriteria }); };
            const removeCriterion = (index) => { const newCriteria = [...formData.criteria]; newCriteria.splice(index, 1); setFormData({ ...formData, criteria: newCriteria }); };
            const addOption = (cIndex) => { const newCriteria = [...formData.criteria]; newCriteria[cIndex].options.push({ score: 0, label: '' }); setFormData({ ...formData, criteria: newCriteria }); };
            const updateOption = (cIndex, oIndex, field, value) => { const newCriteria = [...formData.criteria]; newCriteria[cIndex].options[oIndex][field] = value; setFormData({ ...formData, criteria: newCriteria }); };
            const removeOption = (cIndex, oIndex) => { const newCriteria = [...formData.criteria]; newCriteria[cIndex].options.splice(oIndex, 1); setFormData({ ...formData, criteria: newCriteria }); };

            const calculateAutoTotal = () => {
                let total = 0;
                formData.criteria.forEach(c => {
                    if (c.options.length > 0) {
                        const scores = c.options.map(o => Number(o.score) || 0);
                        const maxScore = scores.length > 0 ? Math.max(...scores) : 0;
                        total += maxScore;
                    }
                });
                return total;
            };

            const subjectsSafe = subjects || [];

            return (
                <div className="flex-1 flex flex-col h-full bg-white/50 backdrop-blur-md">
                    <div className="h-auto md:h-14 py-3 md:py-0 border-b border-gray-200 flex flex-wrap gap-2 md:gap-0 items-center justify-between px-4 md:px-6 bg-white/70 shrink-0">
                        <button onClick={onCancel} className="flex items-center text-gray-500 hover:text-gray-800 transition-colors" disabled={isAnalyzing}>
                            <Icons.ChevronLeft />
                            <span className="ml-1 text-sm font-medium">ย้อนกลับ</span>
                        </button>
                        <h2 className="text-base md:text-lg font-bold text-gray-800 truncate px-2 max-w-[200px] md:max-w-md text-center">
                            {form ? 'แก้ไขแบบประเมิน' : 'สร้างแบบประเมินใหม่'}
                        </h2>
                        <button onClick={handleSubmit} disabled={isAnalyzing} className="px-4 py-1.5 bg-mac-blue text-white rounded-md text-sm font-medium shadow-sm hover:bg-blue-600 transition disabled:opacity-50">
                            บันทึก
                        </button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 md:p-8">
                        <div className="max-w-4xl mx-auto space-y-6 md:space-y-8 pb-12">
                            <div className="flex justify-center bg-gray-100 p-1.5 rounded-xl w-fit mx-auto flex-wrap gap-1 md:gap-2 shadow-inner">
                                <button type="button" onClick={() => setFormData({...formData, type: 'manual'})} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all flex items-center ${formData.type === 'manual' ? 'bg-white shadow-sm text-mac-blue' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200'}`}>
                                    <Icons.PenTool width="16" height="16" className="mr-1.5" /> พิมพ์เอง (Manual)
                                </button>
                                <button type="button" onClick={() => setFormData({...formData, type: 'ai'})} className={`px-3 md:px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all flex items-center ${formData.type === 'ai' ? 'bg-white shadow-sm text-purple-600 border border-purple-100' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200'}`}>
                                    <Icons.Sparkles width="16" height="16" className="mr-1.5" /> ให้ AI ช่วยพิมพ์ให้
                                </button>
                            </div>

                            {formData.type === 'ai' ? (
                                <div className="bg-white p-6 rounded-xl border border-dashed border-purple-300 text-center space-y-4 shadow-sm">
                                    <div className="mx-auto w-12 h-12 bg-purple-50 rounded-full flex items-center justify-center text-purple-500">
                                        <Icons.Sparkles width="24" height="24" />
                                    </div>
                                    <div className="max-w-md mx-auto space-y-1">
                                        <h3 className="text-sm font-bold text-gray-800">สร้างแบบประเมินอย่างรวดเร็วด้วย AI</h3>
                                        <p className="text-xs text-gray-500">อัปโหลดภาพตารางเกณฑ์คะแนน AI จะวิเคราะห์และสร้างให้ทันที</p>
                                    </div>
                                    <div className="pt-2">
                                        <input 
                                            type="file" 
                                            accept="image/*" 
                                            onChange={handleAiImageUpload} 
                                            className="hidden" 
                                            id="ai-upload-input" 
                                        />
                                        <label 
                                            htmlFor="ai-upload-input"
                                            className="inline-flex items-center px-4 py-2 bg-purple-600 text-white rounded-lg text-xs font-semibold cursor-pointer hover:bg-purple-700 shadow-sm transition"
                                        >
                                            <Icons.Upload width="14" height="14" className="mr-1.5" />
                                            เลือกภาพถ่ายเกณฑ์ประเมิน
                                        </label>
                                    </div>
                                    {aiImage && (
                                        <div className="space-y-3 pt-4 border-t max-w-sm mx-auto">
                                            <img src={aiImage} alt="AI Source Preview" className="h-40 mx-auto object-contain rounded border" />
                                            <button 
                                                type="button" 
                                                onClick={processAI}
                                                disabled={isAnalyzing}
                                                className="w-full py-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-lg text-xs font-bold hover:shadow transition disabled:opacity-50"
                                            >
                                                {isAnalyzing ? "กำลังใช้ AI ประมวลผลภาพ..." : "✨ เริ่มวิเคราะห์ภาพด้วย AI"}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100">
                                        <h3 className="text-sm font-semibold text-gray-700 mb-4 pb-2 border-b">ข้อมูลทั่วไป</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="col-span-1 md:col-span-2">
                                                <label className="block text-xs font-medium text-gray-600 mb-1">ชื่อแบบประเมิน <span className="text-red-500">*</span></label>
                                                <input type="text" name="title" value={formData.title} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-mac-blue/50 text-xs" placeholder="เช่น แบบประเมินการตรวจร่างกาย..." required />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-gray-600 mb-1">รายวิชาแพทย์</label>
                                                <select name="subjectId" value={formData.subjectId} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none text-xs" required>
                                                    <option value="">-- กรุณาเลือกวิชา --</option>
                                                    {subjectsSafe.map(s => (
                                                        <option key={s.id} value={s.id}>{s.code} {s.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-gray-600 mb-1">ระดับชั้นปีนักศึกษา</label>
                                                <select name="year" value={formData.year} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md bg-white focus:outline-none text-xs">
                                                    <option value={4}>ชั้นปีที่ 4</option>
                                                    <option value={5}>ชั้นปีที่ 5</option>
                                                    <option value={6}>ชั้นปีที่ 6</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-gray-600 mb-1">คะแนนดิบรวม (คำนวณอัตโนมัติ: {calculateAutoTotal()})</label>
                                                <input type="number" name="totalScore" value={formData.totalScore} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none text-xs" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-medium text-gray-600 mb-1">ค่าน้ำหนักสัดส่วนคะแนน (%)</label>
                                                <input type="number" name="weightPercent" value={formData.weightPercent} onChange={handleChange} className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none text-xs" />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="flex items-center justify-between">
                                            <h3 className="text-sm font-semibold text-gray-700">หัวข้อการประเมิน (Criteria)</h3>
                                            <button 
                                                type="button" 
                                                onClick={addCriterion}
                                                className="flex items-center px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-xs font-semibold transition"
                                            >
                                                <Icons.Plus className="mr-1" />
                                                เพิ่มเกณฑ์
                                            </button>
                                        </div>

                                        {formData.criteria.map((c, cIdx) => (
                                            <div key={c.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 space-y-4 relative">
                                                <button 
                                                    type="button"
